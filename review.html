<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Question Review — Tasmania Motorcycle DKT</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext transform=%27translate(100,0) scale(-1,1)%27 y=%270.9em%27 font-size=%2780%27%3E%F0%9F%8F%8D%EF%B8%8F%3C/text%3E%3C/svg%3E">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --amber:#f59e0b;--amberD:#d97706;--teal:#0d9488;--tealL:#14b8a6;
  --green:#10b981;--red:#ef4444;
  --bg:#fdf7f0;--card:#fff;--text:#1e293b;--textM:#64748b;--textL:#94a3b8;
  --border:#e2e8f0;--radius:12px
}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:90px}
body.dark{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--textM:#94a3b8;--textL:#64748b;--border:#334155}

.top-bar{background:#1e3a8a;border-bottom:1px solid #1e40af;padding:8px 16px;position:sticky;top:0;z-index:30}
.top-inner{max-width:700px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:8px}
.top-logo{max-height:44px;max-width:180px;display:block;cursor:pointer}
.top-tools{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.tbtn{background:none;border:1px solid #ffffff40;border-radius:6px;padding:3px 9px;cursor:pointer;font-size:11px;color:#fff;font-family:inherit;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.tbtn:hover{background:#ffffff18}
.mode-strip{background:#1e3a8a;border-bottom:2px solid #1e40af;text-align:center;padding:3px 0 5px;font-size:11px;font-weight:800;color:#ffffffbb;letter-spacing:0.8px;text-transform:uppercase}

.filter-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;position:sticky;top:61px;z-index:25}
body.dark .filter-bar{border-bottom-color:var(--border)}
.filter-inner{max-width:700px;margin:0 auto;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.fbtn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--textM);transition:all 0.15s;white-space:nowrap}
.fbtn.active{background:#1e3a8a;border-color:#1e3a8a;color:#fff}
.fbtn.flag-active{background:#f59e0b;border-color:#f59e0b;color:#fff}
.q-count{font-size:12px;color:var(--textM);font-weight:700;margin-left:auto;white-space:nowrap}
.jump-wrap{display:flex;gap:4px;align-items:center}
.jump-input{width:54px;border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);text-align:center}
.jump-btn{background:var(--teal);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}

.container{max-width:700px;margin:0 auto;padding:12px 16px}
.q-card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px #0001,0 4px 16px #0001;padding:20px}

.q-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.q-badge{background:#1e3a8a;color:#fff;border-radius:8px;padding:4px 11px;font-size:13px;font-weight:800;white-space:nowrap}
.q-topic-tag{font-size:11px;font-weight:700;color:var(--textM);text-align:right;line-height:1.4;max-width:200px}
.q-text{font-size:18px;font-weight:700;line-height:1.4;margin-bottom:14px}
.q-img{background:#e8f5e9;border-radius:8px;overflow:hidden;margin-bottom:14px;text-align:center;max-height:280px;display:flex;align-items:center;justify-content:center}
.q-img img{max-width:100%;max-height:280px;object-fit:contain;display:block}

.opt-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:2px solid var(--border);border-radius:10px;margin-bottom:7px;background:var(--card)}
.opt-row.is-correct{border-color:var(--green);background:#ecfdf5}
body.dark .opt-row.is-correct{background:#0a2e1a;border-color:var(--green)}
.opt-ltr{font-weight:800;font-size:14px;color:var(--textM);flex-shrink:0;min-width:20px;margin-top:1px}
.opt-row.is-correct .opt-ltr{color:var(--green)}
.opt-chk{font-size:15px;flex-shrink:0;margin-top:1px;width:18px;text-align:center}
.opt-txt{font-size:15px;line-height:1.4;flex:1}

.exp-box{background:#f0fdfa;border:2px solid #99f6e4;border-radius:10px;padding:14px;margin-top:14px}
body.dark .exp-box{background:#0a2e1a;border-color:#134e3a}
.exp-label{font-size:11px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.exp-text{font-size:14px;line-height:1.6;color:var(--text)}
.exp-src{font-size:12px;margin-top:9px;color:var(--textM);font-weight:600;border-top:1px solid #0002;padding-top:7px}
.exp-src a{color:var(--teal);text-decoration:none;font-weight:700}
.exp-src a:hover{text-decoration:underline}

.flag-row{display:flex;justify-content:flex-end;margin-top:13px}
.flag-btn{background:none;border:2px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;color:var(--textM);transition:all 0.15s;display:flex;align-items:center;gap:5px}
.flag-btn:hover{border-color:#f59e0b;color:#f59e0b}
.flag-btn.flagged{background:#f59e0b;border-color:#f59e0b;color:#fff}

.nav-fixed{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:20;padding:8px 16px 12px}
body.dark .nav-fixed{border-top-color:var(--border)}
.nav-inner{max-width:700px;margin:0 auto;display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:var(--radius);border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;text-decoration:none;flex:1}
.btn-primary{background:var(--amber);color:#fff}.btn-primary:hover{background:var(--amberD)}
.btn-outline{background:var(--card);color:var(--text);border:2px solid var(--border)}.btn-outline:hover{border-color:var(--textL)}
.btn:disabled{opacity:0.35;cursor:default;pointer-events:none}
.nav-pos{font-size:13px;font-weight:800;color:var(--textM);text-align:center;white-space:nowrap;min-width:64px}

.empty{text-align:center;padding:48px 24px;color:var(--textM)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-msg{font-size:15px;font-weight:600;line-height:1.6}

@media(min-width:500px){.q-text{font-size:20px}.opt-txt{font-size:16px}}
</style>
</head>

    <input class="jump-input" id="jumpInput" type="number" min="1" max="184" placeholder="Q#" onkeydown="if(event.key==='Enter')jumpTo()">

<script>
const ALL_REVIEW_QS=[
  {n:1,id:"g1",topic:"Line Markings & Lanes",q:"Can Car A cross the double lines?",img:"1",opts:["Yes - to overtake another vehicle.","Yes - to turn into a driveway.","Yes - to pass a cyclist if it’s safe to do so.","Yes - to do a U-turn."],c:2,exp:"Double lines can be crossed when passing a cyclist safely. Always ensure you have adequate space and visibility.",src:"Tasmanian Road Rules 2022, Section 5 (p. 12)"},
  {n:2,id:"g2",topic:"Line Markings & Lanes",q:"Which car(s) can cross the lines to overtake (when it’s safe)?",img:"2",opts:["Car A.","Car B.","Both Cars A and B can cross the lines to overtake.",""],c:0,exp:"When a broken line is on your side of a single continuous line, you can cross to overtake.",src:"Tasmanian Road Rules 2022, Section 5 (p. 15-16)"},
  {n:3,id:"g3",topic:"Line Markings & Lanes",q:"You are driving Car A. When can’t you cross the double broken lines?",img:"3",opts:["To overtake another vehicle if safe to do so.","To turn into a driveway.","To turn into a road.","To avoid an obstruction on the road."],c:0,exp:"Double broken lines can only be crossed for certain purposes. Crossing solely to overtake other vehicles is not permitted.",src:"Tasmanian Road Rules 2022, Section 5 (p. 14)"},
  {n:4,id:"g4",topic:"Line Markings & Lanes",q:"You are driving Car A. When can’t you cross the single continuous line?",img:"4",opts:["To overtake another vehicle if it is safe to do so","To turn into a driveway","To turn into a road","To avoid an obstruction on the road"],c:0,exp:"A single continuous line on your side means you cannot cross to overtake. You may cross for other legal purposes like turning or entering a property.",src:"Tasmanian Road Rules 2022, Section 5 (p. 13)"},
  {n:5,id:"g49",topic:"Line Markings & Lanes",q:"You can do a U-turn at an intersection with traffic lights –",img:"49",opts:["Between 9 p.m. and 6 a.m.","Only when there is “U-turn permitted” sign.","If there is no oncoming traffic.","If the traffic lights are green."],c:1,exp:"You can only make a U-turn at a traffic light intersection when a U-turn permitted sign is displayed.",src:"Tasmanian Road Rules 2022, Section 8 (p. 33)"},
  {n:6,id:"g62",topic:"Line Markings & Lanes",q:"You are driving a vehicle along a multi-lane road and the speed limit is 80km/h or less, which lane should you travel in?",img:null,opts:["In the left-hand lane unless overtaking another vehicle in the left lane.","In the left-hand lane unless you are turning right.","In either lane.","You must travel in the left-hand lane."],c:2,exp:"On multi-lane roads with speed limits of 80 km/h or less, you may travel in any lane unless signs indicate otherwise.",src:"Tasmanian Road Rules 2022, Section 4 (p. 9)"},
  {n:7,id:"g63",topic:"Line Markings & Lanes",q:"You are driving Car A along a multi-lane road and the speed limit is more than 80 km/h, which of the following statements is WRONG?",img:"63",opts:["You must drive in the left hand lane unless you are turning right.","You must travel in the left hand lane unless you are overtaking a vehicle in the left hand lane.","You must travel in the left hand lane unless avoiding an obstruction.","You can travel in either lane."],c:3,exp:"The Keep Left Unless Overtaking rule applies on multi-lane roads with speed limits over 80 km/h (except when congested or turning right).",src:"Tasmanian Road Rules 2022, Section 4 (p. 9-11)"},
  {n:8,id:"g64",topic:"Line Markings & Lanes",q:"Where there are no line markings on the road where should you drive?",img:"64",opts:["In the centre of the road.","On any part of the road.","Within two metres of the left-hand side of the road.","As close as practical to the left side of the road."],c:3,exp:"When there are no line markings, drive as close as practical to the left side of the road.",src:"Tasmanian Road Rules 2022, Section 4 (p. 9)"},
  {n:9,id:"g65",topic:"Line Markings & Lanes",q:"Which of the following statements is correct? On a multi-laned road (with two or more lanes travelling in the same direction) drivers may:",img:null,opts:["Make a U-turn across lanes travelling in the same direction.","Change lanes without indicating.","Change lanes when it is safe to do so.","Change lanes at any time, as other drivers must show courtesy and give way"],c:2,exp:"Drivers may change lanes when it is safe to do so, after indicating and checking for other traffic.",src:"Tasmanian Road Rules 2022, Section 7 (p. 24)"},
  {n:10,id:"g66",topic:"Line Markings & Lanes",q:"You are driving car A. In what direction must you travel?",img:"66",opts:["Turn right only.","Turn left only.","Straight ahead or make a right turn.","Straight ahead only."],c:0,exp:"A green arrow pointing right means you can turn right at that moment only.",src:"Tasmanian Road Rules 2022, Section 5 (p. 18)"},
  {n:11,id:"g67",topic:"Line Markings & Lanes",q:"You are driving Car A. In what direction must you travel?",img:"67",opts:["Turn left or go straight ahead.","Turn left only when there is traffic in the other lane.","Go straight ahead.","Turn left."],c:3,exp:"A left arrow on the road means you must turn left. You cannot go straight.",src:"Tasmanian Road Rules 2022, Section 5 (p. 18)"},
  {n:12,id:"g68",topic:"Line Markings & Lanes",q:"You are driving Car A and you want to merge with another line of traffic travelling in the same direction (there are no marked lanes) –",img:"68",opts:["You must give way to Car B as it is on your right","You have right of way, as you are travelling ahead of Cars B and C.","You have to give way to Cars B and C as they are to your right.","You have to give way to cars B and C as you are travelling ahead of them."],c:0,exp:"When merging, give way to all traffic already in the lane you are entering.",src:"Tasmanian Road Rules 2022, Section 7 (p. 24)"},
  {n:13,id:"g69",topic:"Line Markings & Lanes",q:"You are driving Car A in a 60 km/h speed zone. Your lane ends and you must merge with another lane of traffic travelling in the same direction (there are line markings) -",img:"69",opts:["Cars B and C have to give way to you as they are in the right lane","You have to give way to Cars B and C as you are moving into their lane.","Cars B and C have to give way to you as you are travelling ahead of them.","You have to give way to Car B as it is travelling ahead of you."],c:1,exp:"When a marked lane ends, give way to traffic in the continuing lane as you are moving into their space.",src:"Tasmanian Road Rules 2022, Section 7 (p. 24)"},
  {n:14,id:"g70",topic:"Line Markings & Lanes",q:"You are driving Car A in a 100 km/hr speed zone. Your lane has come to an end and you want to merge into another lane of traffic. There are road markings.",img:"70",opts:["You must give way to Car B as you are moving into the lane it is travelling in.","Car B has to give way to you as you are travelling ahead of it.","Car B has to give way to you as it is in the right lane.",""],c:0,exp:"When merging at high speed, give way to any vehicle in the lane you are entering.",src:"Tasmanian Road Rules 2022, Section 7 (p. 24)"},
  {n:15,id:"g84",topic:"Line Markings & Lanes",q:"What is the minimum recommended distance to leave between your vehicle and a cyclist when passing in a 50 km/h zone?",img:null,opts:["1 metre","2 metres","No distance",""],c:0,exp:"You must leave at least 1 metre when passing a cyclist in 50 km/h zones and 1.5 metres in higher speed zones.",src:"Tasmanian Road Rules 2022, Section 5 (p. 17)"},
  {n:16,id:"g102",topic:"Line Markings & Lanes",q:"This sign means on a multi-laned road?",img:"102",opts:["Keep left at all times.","Drivers must only overtake using the left lane.","Drivers must not use the right lane unless they are overtaking, turning right","Drivers must not use the right lane at any time."],c:2,exp:"Keep Left Unless Overtaking sign requires staying in left lane except to pass, turn right, or when congested.",src:"Tasmanian Road Rules 2022, Section 4 (p. 9-10)"},
  {n:17,id:"g112",topic:"Line Markings & Lanes",q:"What does this sign mean?",img:"112",opts:["Cyclists cannot use the road","You should give bicycle riders at least 1.5 metres when you pass.","You must wait 1.5 metres behind a cyclist before passing.",""],c:1,exp:"Pass cyclists safely signs indicate you must leave the specified distance (1.5m) when overtaking cyclists.",src:"Tasmanian Road Rules 2022, Section 5 (p. 17)"},
  {n:18,id:"g5",topic:"Intersections & Give Way Rules",q:"This sign means?",img:"5",opts:["Stop only if traffic or pedestrians are coming from the right.","Slow down and if it is safe, drive through the intersection.","Stop, only for pedestrians.","Stop at the solid white line at the intersection and give way to vehicles on your left and right and any pedestrians."],c:3,exp:"Stop at the white line and give way to all traffic and pedestrians from any direction.",src:"Tasmanian Road Rules 2022, Section 11 (p. 44)"},
  {n:19,id:"g6",topic:"Intersections & Give Way Rules",q:"This sign means?",img:"6",opts:["Give way only to traffic on your right.","It is a warning sign indicating that drivers may stop if they choose to.","Come to a complete stop and then give way to all vehicles and pedestrians before driving into the intersection.","Slow down and be prepared to stop to give way to traffic on your left and right and pedestrians."],c:3,exp:"Slow down and be prepared to stop. Give way to all traffic and pedestrians from any direction.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:20,id:"g7",topic:"Intersections & Give Way Rules",q:"Car A wants to turn right at an intersection with green traffic lights. It should indicate and -",img:"7",opts:["Give way to oncoming traffic (including vehicles turning left) and pedestrians.","Wait for the yellow light, oncoming traffic must stop and give way.","Turn quickly, oncoming traffic must give way.","Wait for 5 seconds then turn quickly."],c:0,exp:"When turning right, give way to oncoming traffic and pedestrians.",src:"Tasmanian Road Rules 2022, Section 10 (p. 39)"},
  {n:21,id:"g8",topic:"Intersections & Give Way Rules",q:"When approaching an intersection with a single flashing yellow traffic light. You must -",img:null,opts:["Slow down and sound the horn.","Stop and give way to all traffic.","Slow down; be prepared to stop and give way to vehicles on the right then","Accelerate through the intersection."],c:2,exp:"A flashing yellow light requires you to slow down and check for traffic from your right before proceeding.",src:"Tasmanian Road Rules 2022, Section 10 (p. 39)"},
  {n:22,id:"g9",topic:"Intersections & Give Way Rules",q:"Who must give way at a pedestrian crossing?",img:"9",opts:["Only the driver of Car A, which is travelling on the same side of the road as the pedestrian.","Neither Car A or Car B must give way if the pedestrian is in the middle of the road.","Car A and Car B must stop and give way to any pedestrian on the crossing.","The pedestrian must give way to all traffic."],c:1,exp:"All drivers must give way to pedestrians on or entering pedestrian crossings, regardless of direction or traffic lights.",src:"Tasmanian Road Rules 2022, Section 7 (p. 25)"},
  {n:23,id:"g12",topic:"Intersections & Give Way Rules",q:"In what order should the cars go through the intersection?",img:"12",opts:["Car C, then Car B, then, Car A.","Car B, then Car C, then Car A.","Car B, then Car A, then Car C.","Car A, then Car B, then, Car C."],c:1,exp:"At Stop signs, give way to traffic already in the intersection. Vehicles on continuing road go first.",src:"Tasmanian Road Rules 2022, Section 11 (p. 44-45)"},
  {n:24,id:"g13",topic:"Intersections & Give Way Rules",q:"In what order should the cars go through the roundabout? (Car A and car C are travelling straight ahead. Car B is turning right.)",img:"13",opts:["Car B, then Car C, then Car A.","Car B, then Car A, then Car C.","Car A, then Car B, then, Car C.","Car C, then Car A, then Car B."],c:1,exp:"When entering a roundabout, give way to any vehicle already inside. Vehicles enter in order as space becomes available.",src:"Tasmanian Road Rules 2022, Section 11 (p. 49)"},
  {n:25,id:"g14",topic:"Intersections & Give Way Rules",q:"Which car gives way?",img:"14",opts:["Car A.","Car B.","",""],c:0,exp:"When turning right, give way to oncoming vehicles travelling straight or turning left.",src:"Tasmanian Road Rules 2022, Section 10 (p. 39)"},
  {n:26,id:"g15",topic:"Intersections & Give Way Rules",q:"Which car gives way?",img:"15",opts:["Car A.","Car B.","",""],c:1,exp:"A vehicle turning right must give way to oncoming traffic travelling straight ahead.",src:"Tasmanian Road Rules 2022, Section 10 (p. 39)"},
  {n:27,id:"g16",topic:"Intersections & Give Way Rules",q:"Which vehicle gives way?",img:"16",opts:["Motor cyclist.","Car B","",""],c:1,exp:"At a slip lane, give way to oncoming traffic turning right at the intersection.",src:"Tasmanian Road Rules 2022, Section 11 (p. 48)"},
  {n:28,id:"g17",topic:"Intersections & Give Way Rules",q:"Which car must give way?",img:"17",opts:["Car A","Car B","",""],c:0,exp:"At uncontrolled intersections, give way to all traffic coming from your right.",src:"Tasmanian Road Rules 2022, Section 11 (p. 43)"},
  {n:29,id:"g18",topic:"Intersections & Give Way Rules",q:"Which car must give way?",img:"18",opts:["Car A","Car B","",""],c:1,exp:"If a vehicle has legally entered an intersection and is completing its manoeuvre, vehicles in slip lanes must give way.",src:"Tasmanian Road Rules 2019 Reg 69"},
  {n:30,id:"g19",topic:"Intersections & Give Way Rules",q:"Which car goes first?",img:"19",opts:["Car A","Car B","",""],c:1,exp:"At a GIVE WAY sign, you must give way to all traffic entering or approaching the intersection.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:31,id:"g46",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You are approaching an uncontrolled intersection and want to turn left. There is a cyclist in front of you. You must –",img:"46",opts:["Sound your horn to warn the cyclist that you are behind and the cyclist must","Allow the cyclist to go through the intersection safely then turn left at the intersection.","Accelerate and pass the cyclist then turn left in front of the cyclist.","Accelerate, indicate and sound your horn to warn the cyclist then turn left in front of the cyclist."],c:2,exp:"Always give way to cyclists at intersections. A cyclist travelling straight has priority over a vehicle turning.",src:"Tasmanian Road Rules 2022, Section 8 (p. 30)"},
  {n:32,id:"g50",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You are stopped at a children’s crossing displaying an orange flag. You can drive on when –",img:"50",opts:["The pedestrians have left the crossing.","The pedestrians are not in your car’s path.","The pedestrians are about to step onto the crossing.",""],c:0,exp:"You can only proceed at a children\'s crossing when pedestrians have completely left the crossing area.",src:"Tasmanian Road Rules 2022, Section 7 (p. 25)"},
  {n:33,id:"g51",topic:"Intersections & Give Way Rules",q:"You are driving Car A. Car B In front of you has stopped at a pedestrian crossing, you must –",img:"51",opts:["Overtake Car B.","Overtake with care if satisfied there is no pedestrian on the crossing.","Stop behind Car B.","Indicate and sound your horn to warn Car B and any pedestrians that you are overtaking."],c:2,exp:"Always stop behind a vehicle that has stopped at a pedestrian crossing to allow pedestrians to cross safely.",src:"Tasmanian Road Rules 2022, Section 7 (p. 25)"},
  {n:34,id:"g58",topic:"Intersections & Give Way Rules",q:"You are driving in a built-up area (like a city or town). A bus is stopped at a bus stop in the left lane next to you and has this sign displayed. There are parked vehicles in front of the bus and it has signalled right. What must you do?",img:"58",opts:["Allow the bus to move off from the kerb into your lane.","Continue ahead at the speed limit, providing it is safe.","Slow to 60 km/h and give way to pedestrians only.","Slow to 50 km/h and only stop to give way to pedestrians."],c:0,exp:"Always give way to buses that are signalling and attempting to move into traffic from a bus stop.",src:"Tasmanian Road Rules 2022, Section 7 (p. 28)"},
  {n:35,id:"g71",topic:"Intersections & Give Way Rules",q:"You are driving towards a large roundabout that has multi-lanes. At the roundabout, you intend to turn off more than halfway around the roundabout. What signals must you give?",img:"71",opts:["On approach to the roundabout, give a right signal and, just before the exit road, give a left signal.","Only give a right signal on the approach to the roundabout, as no other signal is required.","Providing it is safe, a signal is not required at all.","On approach to the roundabout, give a left signal then a right signal when turning off."],c:0,exp:"At roundabouts, signal right when approaching if turning more than halfway, and signal left before exiting.",src:"Tasmanian Road Rules 2022, Section 11 (p. 50)"},
  {n:36,id:"g72",topic:"Intersections & Give Way Rules",q:"You are driving a motor vehicle towards a marked multi-laned roundabout. You want to travel straight on through the roundabout to the road opposite. What lane must you take?",img:"72",opts:["You must enter and leave the roundabout in the left lane.","You may enter and leave the roundabout in either lane.","You must enter and leave the roundabout in the right lane.","Move to the left lane before the roundabout then leave by the right lane."],c:2,exp:"When going straight through a multi-lane roundabout, you may use either lane.",src:"Tasmanian Road Rules 2022, Section 11 (p. 50)"},
  {n:37,id:"g75",topic:"Intersections & Give Way Rules",q:"Does a Police Officer’s directions overrule Stop and Give Way signs?",img:"75",opts:["No.","Yes.","Yes, only at Give Way Signs.","Yes, only at Stop Signs."],c:1,exp:"Police officer directions overrule stop and give way signs. You must follow their instructions.",src:"Tasmanian Road Rules 2022, Section 10 (p. 42)"},
  {n:38,id:"g76",topic:"Intersections & Give Way Rules",q:"At an intersection with a Police Officer who has one hand raised and one hand to his side as shown, do you -",img:null,opts:["Turn right.","Stop at the intersection.","Slow down and continue through the intersection.","Obey the traffic lights."],c:2,exp:"A police officer with one hand raised and one to the side directs you to stop at the intersection.",src:"Tasmanian Road Rules 2022, Section 10 (p. 42)"},
  {n:39,id:"g101",topic:"Intersections & Give Way Rules",q:"This sign means?",img:"101",opts:["U-turns allowed.","3 point turn allowed.","Turning area for heavy vehicles – give way.","You are at a roundabout."],c:2,exp:"A Roundabout sign indicates you are approaching or at a roundabout intersection.",src:"Tasmanian Road Rules 2022, Section 11 (p. 49)"},
  {n:40,id:"g110",topic:"Intersections & Give Way Rules",q:"If you are turning at an intersection must you give way to pedestrians?",img:null,opts:["Only if the pedestrians are under the age of 16 years.","Yes.","No.","Only if the pedestrians are over the age of 16 years."],c:2,exp:"You must always give way to pedestrians when turning, including at traffic-controlled intersections.",src:"Tasmanian Road Rules 2022, Section 8 (p. 30-31)"},
  {n:41,id:"g113",topic:"Intersections & Give Way Rules",q:"What must you do at an intersection with green traffic lights, which is blocked by other vehicles?",img:"113",opts:["Enter the intersection.","Enter the intersection if you think the traffic will clear before the traffic lights","Do not enter the intersection until the traffic has cleared and you can safely","Do not enter the intersection unless the lights change to red."],c:2,exp:"You must not enter an intersection when a queue prevents you from fully exiting. Wait until it is clear.",src:"Tasmanian Road Rules 2022, Section 11 (p. 52)"},
  {n:42,id:"g114",topic:"Intersections & Give Way Rules",q:"You are driving Car A. The vehicles in front of you have stopped. When can you drive through the intersection?",img:"114",opts:["At any time when there is a green light if you think that you won’t block it.","At any time when the light is green even if you may block the intersection.","At any time when the light is green and the intersection is clear of traffic.","When the lights are red."],c:2,exp:"Only proceed through an intersection when the light is green AND the intersection is clear of traffic ahead.",src:"Tasmanian Road Rules 2022, Section 11 (p. 52)"},
  {n:43,id:"g115",topic:"Intersections & Give Way Rules",q:"When traffic lights turn from green to yellow you should –",img:"115",opts:["Speed up and go through the lights before they turn red.","Stop, even if you must stop on the intersection and then reverse back to the stop line.","Stop, even if you are in the intersection.","Stop, if you can do so safely before the stop line."],c:3,exp:"You must brake and stop at the stop line when yellow appears, unless too close to stop safely without causing a rear-end collision.",src:"Tasmanian Road Rules 2022, Section 10 (p. 38)"},
  {n:44,id:"g116",topic:"Intersections & Give Way Rules",q:"You are approaching an intersection controlled by traffic lights. There is a red circular light and a green arrow pointing to the right. Can you turn right?",img:"116",opts:["No, not at any time.","Yes.","No, only when both lights are green.","No, but you can go straight ahead."],c:1,exp:"A green right arrow means you can turn right at that moment. You do not need the main green light.",src:"Tasmanian Road Rules 2022, Section 10 (p. 40)"},
  {n:45,id:"g117",topic:"Intersections & Give Way Rules",q:"Which car gives way?",img:"117",opts:["Car A.","Car B.","",""],c:1,exp:"When turning right, you must give way to oncoming traffic turning left at the intersection.",src:"Tasmanian Road Rules 2022, Section 10 (p. 39)"},
  {n:46,id:"g118",topic:"Intersections & Give Way Rules",q:"The traffic lights are green and there is a red right arrow. Cars A and B are going straight ahead, Car C is turning right. Which car(s) go first?",img:"118",opts:["Car A and Car C.","Car B and Car C.","Car C.","Car A and Car B."],c:3,exp:"A red right arrow prevents turning right. Cars A and B can proceed straight on the green light. Car C must wait.",src:"Tasmanian Road Rules 2022, Section 10 (p. 40)"},
  {n:47,id:"g119",topic:"Intersections & Give Way Rules",q:"There are red traffic lights and a green right arrow. Cars A and B are going straight ahead, Car C is turning right. Which car(s) go first?",img:"119",opts:["Car A and Car C.","Car A and Car B.","Car A.","Car C."],c:3,exp:"A green right arrow means Car C can turn right. Cars A and B have red lights and must wait.",src:"Tasmanian Road Rules 2022, Section 10 (p. 40)"},
  {n:48,id:"g120",topic:"Intersections & Give Way Rules",q:"Which vehicle gives way?",img:"120",opts:["Car A","Truck B","",""],c:2,exp:"Neither car has priority when changing lanes. Both must give way to Car C already in the centre lane.",src:"Tasmanian Road Rules 2022, Section 7 (p. 24)"},
  {n:49,id:"g121",topic:"Intersections & Give Way Rules",q:"Which car goes first?",img:"121",opts:["Car A.","Car B.","",""],c:1,exp:"At a STOP sign (more restrictive than GIVE WAY), you must give way. Car B has the stricter control.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:50,id:"g122",topic:"Intersections & Give Way Rules",q:"On a multi-laned road, Car A and Car B want to change to the centre lane. Which car can change lanes first?",img:"122",opts:["Car A - as it is changing into the right hand lane","Car B - as Car C has to give way to a car on its right","Neither Car A or Car B has priority for that lane",""],c:2,exp:"Neither car has priority when changing lanes. Both must give way to Car C already in the centre lane.",src:"Tasmanian Road Rules 2022, Section 7 (p. 24)"},
  {n:51,id:"g123",topic:"Intersections & Give Way Rules",q:"Which vehicle goes first?",img:"123",opts:["Car D.","Cyclist C.","Car B.","Car A."],c:2,exp:"Vehicles with no traffic controls have priority over vehicles facing GIVE WAY signs.",src:"Tasmanian Road Rules 2022, Section 11 (p. 43-44)"},
  {n:52,id:"g124",topic:"Intersections & Give Way Rules",q:"Which car goes first?",img:"124",opts:["Car A.","Car B.","",""],c:1,exp:"Car B on the continuing road has priority. Car A at the GIVE WAY sign must give way.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:53,id:"g125",topic:"Intersections & Give Way Rules",q:"You are driving Car B. You must give way to -",img:"125",opts:["No one (you pull out first).","The pedestrian.","The pedestrian and Car A.","Car A."],c:3,exp:"When leaving a driveway, you must give way to all traffic and pedestrians already on the road.",src:"Tasmanian Road Rules 2022, Section 7 (p. 28)"},
  {n:54,id:"g126",topic:"Intersections & Give Way Rules",q:"Who must give way?",img:"126",opts:["Car A.","The pedestrian.","",""],c:0,exp:"When turning, you must give way to pedestrians on the road you are turning into.",src:"Tasmanian Road Rules 2022, Section 8 (p. 30)"},
  {n:55,id:"g127",topic:"Intersections & Give Way Rules",q:"In what order do the cars go?",img:"127",opts:["Car C, Car A, Car B and Car D","Car C, Car B, Car A and Car D.","Car B, Car A, Car C and Car D.",""],c:0,exp:"Cars on the continuing curved road have priority and go first. Give way vehicles must wait.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46-47)"},
  {n:56,id:"g128",topic:"Intersections & Give Way Rules",q:"Which car goes first?",img:"128",opts:["Car A.","Car B.","",""],c:0,exp:"Car B on the continuing road has priority. Car A must give way.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:57,id:"g129",topic:"Intersections & Give Way Rules",q:"Does the car or the pedestrian have to give way?",img:"129",opts:["The Pedestrian.","The Car.","",""],c:0,exp:"When turning, you must give way to all pedestrians on the road you are turning into.",src:"Tasmanian Road Rules 2022, Section 8 (p. 30)"},
  {n:58,id:"g130",topic:"Intersections & Give Way Rules",q:"Which car must give way?",img:"130",opts:["Car A","Car B","",""],c:1,exp:"When turning right, you must give way to any oncoming vehicle travelling straight ahead.",src:"Tasmanian Road Rules 2022, Section 8 (p. 31)"},
  {n:59,id:"g131",topic:"Intersections & Give Way Rules",q:"Which car must give way?",img:"131",opts:["Car A","Car B","",""],c:1,exp:"At a STOP sign, you must give way to all traffic. Car A has priority.",src:"Tasmanian Road Rules 2022, Section 11 (p. 44)"},
  {n:60,id:"g132",topic:"Intersections & Give Way Rules",q:"Which car must give way?",img:"132",opts:["Car A","Car B19","",""],c:0,exp:"When both vehicles are at STOP signs and on a collision course, the vehicle turning left must give way to the vehicle turning right.",src:"Tasmanian Road Rules 2022, Section 11 (p. 44-45)"},
  {n:61,id:"g133",topic:"Intersections & Give Way Rules",q:"Which car must give way?",img:"133",opts:["Car A","Car B","",""],c:1,exp:"At a STOP sign (more restrictive than GIVE WAY), you must give way. Car B has the stricter control.",src:"Tasmanian Road Rules 2022, Section 11 (p. 44-46)"},
  {n:62,id:"g134",topic:"Intersections & Give Way Rules",q:"Which vehicle goes first?",img:"134",opts:["Car A","Truck B","",""],c:1,exp:"When turning right, you must give way to any oncoming vehicle travelling straight ahead.",src:"Tasmanian Road Rules 2022, Section 8 (p. 31)"},
  {n:63,id:"g135",topic:"Intersections & Give Way Rules",q:"Which car goes first?",img:"135",opts:["Car A","Car B","",""],c:1,exp:"On a terminating road with no traffic controls, the vehicle on the continuing road has priority.",src:"Tasmanian Road Rules 2022, Section 11 (p. 43)"},
  {n:64,id:"g136",topic:"Intersections & Give Way Rules",q:"Which car gives way?",img:"136",opts:["Car A","Car B","",""],c:1,exp:"A vehicle on a terminating road must give way to all traffic on the continuing road.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:65,id:"g137",topic:"Intersections & Give Way Rules",q:"Which car gives way?",img:"137",opts:["Car A","Car B","",""],c:1,exp:"When entering a roundabout, you must give way to any vehicle already inside.",src:"Tasmanian Road Rules 2022, Section 11 (p. 49)"},
  {n:66,id:"g138",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"138",opts:["No one, the other cars must give way to you.","Car D","Cars B, C and D","Car B"],c:3,exp:"At uncontrolled intersections, give way to traffic coming from your right.",src:"Tasmanian Road Rules 2022, Section 11 (p. 43)"},
  {n:67,id:"g139",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"139",opts:["Cars B, C and D","Cars C and B","Car B","Cars B and D"],c:3,exp:"At a Stop sign going straight, give way to traffic from left (turning right) and right (going straight).",src:"Tasmanian Road Rules 2022, Section 11 (p. 45)"},
  {n:68,id:"g140",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"140",opts:["Cars C then B, make sure D is turning left","Cars B and D","Cars D, C and B","Cars D and C"],c:0,exp:"When turning left at a Stop sign, Car A must give way to traffic from the right and oncoming traffic.",src:"Tasmanian Road Rules 2022, Section 11 (p. 44-45)"},
  {n:69,id:"g141",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"141",opts:["Car B","No one, the other cars must give way to you","Both Cars B and C",""],c:2,exp:"When entering traffic from a property, you must give way to all traffic already on the road.",src:"Tasmanian Road Rules 2022, Section 7 (p. 28)"},
  {n:70,id:"g142",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"142",opts:["Car D","Car B","Cars B and D","Cars B and C"],c:3,exp:"At a GIVE WAY sign, you must give way to all traffic on the crossing road.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:71,id:"g143",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"143",opts:["Cars B and C","Cars B and D","Cars D and C",""],c:0,exp:"When turning right on green, give way to oncoming traffic (Car B) and vehicles already moving (Car C).",src:"Tasmanian Road Rules 2022, Section 10 (p. 39)"},
  {n:72,id:"g144",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"144",opts:["Cars B and C","D and C","Car C","Car D"],c:0,exp:"When proceeding on a green light, give way to oncoming traffic and any pedestrians.",src:"Tasmanian Road Rules 2022, Section 10 (p. 39)"},
  {n:73,id:"g145",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"145",opts:["Car C","No one, the other cars must give way to you","Car B","Car D"],c:2,exp:"When turning right, you must give way to oncoming traffic travelling straight or turning left.",src:"Tasmanian Road Rules 2022, Section 8 (p. 30-31)"},
  {n:74,id:"g146",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"146",opts:["Cars B and C","Car B","Car C",""],c:0,exp:"At a T-intersection on a terminating road, you must give way to all traffic on the continuing road.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46-47)"},
  {n:75,id:"g147",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"147",opts:["Car C","Car B and the pedestrian","The pedestrian and Cars B and C","Car B21"],c:2,exp:"When entering traffic from a driveway, you must give way to the pedestrian, Car B and Car C.",src:"Tasmanian Road Rules 2022, Section 7 (p. 28)"},
  {n:76,id:"g148",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"148",opts:["Car C","Car B","No one, the other cars must give way to you.","Cars B and C"],c:3,exp:"On a terminating road at a T-intersection, you must give way to all traffic on the continuing road.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:77,id:"g149",topic:"Intersections & Give Way Rules",q:"You are driving Car A. Which cars must you give way to?",img:"149",opts:["Cars B and C","Cars B, C and D","Cars D and C","Cars D and B"],c:2,exp:"At a multi-way intersection with traffic controls, give way to traffic with no controls and those with less restrictive signs.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:78,id:"g150",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You want to turn right. You must give way to -",img:"150",opts:["Cars B and C","Cars B and C and the pedestrian","Car C and the pedestrian","Car B and the pedestrian"],c:1,exp:"When turning right, give way to oncoming traffic (Car B), cross traffic (Car C), and pedestrians.",src:"Tasmanian Road Rules 2022, Section 8 (p. 31)"},
  {n:79,id:"g151",topic:"Intersections & Give Way Rules",q:"You are driving Car A. You must give way to -",img:"151",opts:["No one (you go first)","Car B","Cars B, C and D","Cars B and C"],c:2,exp:"At a GIVE WAY sign, you must give way to all vehicles on the continuing road.",src:"Tasmanian Road Rules 2022, Section 11 (p. 46)"},
  {n:80,id:"g10",topic:"Speed Limits & Signs",q:"What is the maximum speed a car learner licence holder can drive in a 110 km/h speed zone?",img:"10",opts:["110 km/h.","90 km/h.","100 km/h.","80 km/h."],c:2,exp:"Learner drivers must not exceed 90 km/h, even in higher speed zones.",src:"Tasmanian Road Rules 2022, Section 6 (p. 21)"},
  {n:81,id:"g52",topic:"Speed Limits & Signs",q:"As a P1 licence holder, what is the maximum speed you can drive on a road with this sign?",img:"52",opts:["80 km/h.","90 km/h.","100 km/h.","110 km/h."],c:1,exp:"P1 holders must not exceed 100 km/h, even in higher speed zones.",src:"Tasmanian Road Rules 2022, Section 6 (p. 21)"},
  {n:82,id:"g53",topic:"Speed Limits & Signs",q:"This sign means?",img:"53",opts:["You must travel more than 60 km/h.","You must not travel more than 60 km/h.","You are on Highway number 60.","Children’s crossing, slow down."],c:1,exp:"A speed limit sign indicates the maximum legal speed you must not exceed.",src:"Tasmanian Road Rules 2022, Section 6 (p. 20)"},
  {n:83,id:"g54",topic:"Speed Limits & Signs",q:"What is the maximum speed limit (unless signposted otherwise) for vehicles in a built-up area (like a town or a city)?",img:null,opts:["70 km/h.","80 km/h.","60 km/h.","50 km/h."],c:1,exp:"The default speed limit in built-up areas is 50 km/h unless signposted otherwise.",src:"Tasmanian Road Rules 2022, Section 6 (p. 20)"},
  {n:84,id:"g55",topic:"Speed Limits & Signs",q:"What is the maximum speed limit for vehicles turning at an intersection controlled by traffic lights?",img:null,opts:["20 km/h.","10 km/h.","15 km/h.","50 km/h."],c:0,exp:"You must not travel faster than 20 km/h when turning at an intersection with traffic lights.",src:"Tasmanian Road Rules 2022, Section 6 (p. 21)"},
  {n:85,id:"g56",topic:"Speed Limits & Signs",q:"When approaching a stopped school bus with amber flashing lights that is letting off children (on a country road), you must -",img:null,opts:["Slow down to 10 km/h within 10 metres of the bus and watch for pedestrians.","Drive within the posted speed limit and watch for pedestrians.","Slow down to 5 km/h within 10 metres of the bus and watch for pedestrians.","Slow down to 40 km/h 50 metres before you overtake the bus and watch for pedestrians."],c:0,exp:"You must slow to 40 km/h within 50 metres of a school bus with flashing amber lights to protect children.",src:"Tasmanian Road Rules 2022, Section 6 (p. 22)"},
  {n:86,id:"g57",topic:"Speed Limits & Signs",q:"This sign means?",img:"57",opts:["You must not travel more than 60 km/h.","You can travel at the speed that normally applies to the road, as it is a warning sign suggesting that you slow down.","You can travel at any speed as it only applies to road construction vehicles.","You can travel at any speed if you are driving to or from your work."],c:1,exp:"Speed limit signs at road works are mandatory. You must not exceed the posted limit.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:87,id:"g59",topic:"Speed Limits & Signs",q:"What is the maximum speed limit in a school zone during school days?",img:"59",opts:["45 km/h.","60 km/h.","40 km/h.","50 km/h."],c:1,exp:"A speed limit of 40 km/h applies in school zones on official school days during designated times.",src:"Tasmanian Road Rules 2022, Section 6 (p. 22)"},
  {n:88,id:"g60",topic:"Speed Limits & Signs",q:"Which ONE of the following statements is true?",img:null,opts:["The speed limit in School Zones does not apply if there are no children","The speed limit in School Zones only applies to children from within that","The speed limit applies on weekdays only.","The speed limit in school zones applies on official school days and during"],c:3,exp:"School zones apply only on official school days (Monday to Friday during school terms) during the times shown on signs.",src:"Tasmanian Road Rules 2022, Section 6 (p. 22)"},
  {n:89,id:"g85",topic:"Speed Limits & Signs",q:"This sign means?",img:"85",opts:["45 km/h is the advised maximum speed to travel around the curve ahead under good driving conditions.","Winding road for next 45 kilometres.","45 km/h is the legal maximum speed limit for the curve ahead.","You can only turn right for the next 45 km."],c:2,exp:"Yellow warning signs indicate advised speeds for hazards, not legal limits. Adjust to road and weather conditions.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:90,id:"g86",topic:"Speed Limits & Signs",q:"This sign means?",img:"86",opts:["Road incomplete.","Divided road ahead.","Incomplete roundabout ahead.","Modified ‘T’ intersection ahead."],c:1,exp:"A divided road sign alerts you that a divided road begins ahead where traffic flows in opposite directions are separated.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:91,id:"g87",topic:"Speed Limits & Signs",q:"This sign means?",img:"87",opts:["Steep hill ahead.","Unmade road ahead.","Slippery road ahead.","Winding road ahead"],c:2,exp:"A winding road sign warns of multiple curves or bends ahead. Reduce speed and stay alert.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:92,id:"g88",topic:"Speed Limits & Signs",q:"This sign means?",img:"88",opts:["Hairpin bend to the right.","‘U’ turns allowed.","You must turn right.","Road ends – turn around"],c:0,exp:"A hairpin bend sign shows a sharp U-shaped curve ahead. Reduce speed significantly.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:93,id:"g89",topic:"Speed Limits & Signs",q:"This sign means?",img:"89",opts:["Helicopter landing pad ahead.","Ambulance Station ahead.","Hospital emergency entrance ahead.","A crossroad intersection ahead."],c:3,exp:"A T-intersection sign alerts drivers to a crossing intersection ahead where traffic flows meet at a T shape.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:94,id:"g90",topic:"Speed Limits & Signs",q:"This sign means?",img:"90",opts:["Left lane closed, right lane open.","Left lane open, right lane closed.","Trucks must use right lane.","“T” intersection ahead."],c:1,exp:"This sign shows which lanes are open or closed. The symbol visually depicts the right lane ending.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:95,id:"g91",topic:"Speed Limits & Signs",q:"This sign means?",img:"91",opts:["Bends ahead.","Road slopes ahead.","Slippery surface ahead.","Steep winding road ahead."],c:2,exp:"A slippery surface sign warns of loose gravel, wet conditions, or other hazards reducing traction. Reduce speed.",src:"Tasmanian Road Rules 2022, Section 14 (p. 65)"},
  {n:96,id:"g92",topic:"Speed Limits & Signs",q:"This sign means?",img:"92",opts:["Do not pass another vehicle.","Stop and give way to all traffic and pedestrians.","Do not drive beyond this sign.","Allowed to enter."],c:2,exp:"A No Entry sign prohibits all vehicles from travelling past it into that road or area.",src:"Tasmanian Road Rules 2022, Section 14 (p. 62)"},
  {n:97,id:"g93",topic:"Speed Limits & Signs",q:"This sign means?",img:"93",opts:["No right turn.","One way traffic.","Left turn only sign.","Keep to the left of the sign."],c:3,exp:"A Keep Left sign directs you to pass to the left of a traffic island, median strip, or obstruction.",src:"Tasmanian Road Rules 2022, Section 14 (p. 64)"},
  {n:98,id:"g94",topic:"Speed Limits & Signs",q:"This sign means?",img:"94",opts:["Vehicles travel in both directions on this road.","No right or left turns.","No 3 point turns allowed.","No U-turns allowed."],c:0,exp:"A two-way traffic sign warns that vehicles are approaching or travelling in opposite directions on the road ahead.",src:"Tasmanian Road Rules 2022, Section 14 (p. 64)"},
  {n:99,id:"g95",topic:"Speed Limits & Signs",q:"This sign means?",img:"95",opts:["Danger, road bends sharply right.","Speed zone ends.","You must not turn right.","No sharp right hand bends ahead."],c:2,exp:"A No Right Turn sign legally prohibits right turns at that location.",src:"Tasmanian Road Rules 2022, Section 14 (p. 63)"},
  {n:100,id:"g96",topic:"Speed Limits & Signs",q:"This sign means?",img:"96",opts:["Danger, road bends sharply left.","Speed zone ends.","No sharp left hand bends ahead.","You must not turn left."],c:3,exp:"A No Left Turn sign legally prohibits left turns at that location.",src:"Tasmanian Road Rules 2022, Section 14 (p. 63)"},
  {n:101,id:"g97",topic:"Speed Limits & Signs",q:"This sign means?",img:"97",opts:["Danger road ends.","You must not turn right.","No U-Turn Allowed.","Speed zone ends."],c:2,exp:"A No U-Turn sign prohibits making U-turn manoeuvres at that location.",src:"Tasmanian Road Rules 2022, Section 14 (p. 63)"},
  {n:102,id:"g98",topic:"Speed Limits & Signs",q:"This sign means?",img:"98",opts:["Traffic must travel along the road only in the direction of the arrow.","Left turn at any time with care.","Right turn at any time with care.","Traffic can travel along the road in either direction."],c:0,exp:"A One-Way sign legally mandates that all traffic must travel only in the direction the arrow indicates.",src:"Tasmanian Road Rules 2022, Section 14 (p. 64)"},
  {n:103,id:"g99",topic:"Speed Limits & Signs",q:"There are two types of road signs - warning and regulatory. What is the difference between them?",img:null,opts:["No difference, they don’t need to be obeyed.","Regulatory signs alert drivers to road conditions and should be obeyed.","Warning signs alert drivers to road conditions and should be obeyed.","No difference, they are both the same."],c:2,exp:"Warning signs alert drivers to road conditions and should be obeyed; regulatory signs instruct on traffic laws that must be followed.",src:"Tasmanian Road Rules 2022, Section 14 (p. 62-65)"},
  {n:104,id:"g100",topic:"Speed Limits & Signs",q:"This sign means?",img:"100",opts:["Do not stop in the area covered by the sign for any reason.","You can park for a short time.","Stop to pick up or drop off passengers or goods.","Do not stand during the hours 8.30 a.m. to 4.30 p.m."],c:0,exp:"A No Stopping sign means you must not stop for any reason (except in traffic jam or emergency).",src:"Tasmanian Road Rules 2022, Section 14 (p. 63)"},
  {n:105,id:"g103",topic:"Speed Limits & Signs",q:"This sign means?",img:"103",opts:["Parking permitted only for people in wheelchairs.","Parking permitted for people with disabilities that have a current disability","Anyone may stop but only for a maximum of 2 minutes to pick up or drop off","Parking permitted for people with prams."],c:1,exp:"Disabled parking bays are reserved for vehicles displaying a valid disability parking permit.",src:"Tasmanian Road Rules 2022, Section 13 (p. 59)"},
  {n:106,id:"g104",topic:"Speed Limits & Signs",q:"This sign means?",img:"104",opts:["Parking permitted during non-peak hours.","Parking for buses only.","No parking for any reason.","No parking unless you are stopping for a maximum of 2 minutes to pick up or drop off passengers or goods."],c:3,exp:"A No Parking sign allows stopping for maximum 2 minutes to pick up or drop off passengers or goods.",src:"Tasmanian Road Rules 2022, Section 13 (p. 59)"},
  {n:107,id:"g105",topic:"Speed Limits & Signs",q:"This sign means?",img:"105",opts:["Drivers cannot stop for more than five minutes to pick up or drop off passengers.","Drivers cannot stop during the times and days stated.","Drivers must not stop at any time.","Drivers can only stop during the times and days stated."],c:1,exp:"A Clearway sign prohibits stopping during the times and days stated on the sign.",src:"Tasmanian Road Rules 2022, Section 13 (p. 60)"},
  {n:108,id:"g106",topic:"Speed Limits & Signs",q:"How close to a junction or an intersection without traffic lights can you legally park?",img:null,opts:["10 metres.","9 metres.","3 metres.","15 metres."],c:1,exp:"You must not park within 10 metres of an intersection without traffic lights.",src:"Tasmanian Road Rules 2022, Section 13 (p. 60)"},
  {n:109,id:"g107",topic:"Speed Limits & Signs",q:"Can you park on a road over your own private driveway?",img:null,opts:["Yes, but only for 10 minutes.","Yes.","No (unless dropping off or picking up passengers or goods)",""],c:2,exp:"You must not park over your driveway except when dropping off or picking up passengers.",src:"Tasmanian Road Rules 2022, Section 13 (p. 61)"},
  {n:110,id:"g108",topic:"Speed Limits & Signs",q:"How must you park in a two-way street that has no signposted parking restrictions?",img:null,opts:["You must park parallel and as close as practical to the right-hand kerb.","You must park parallel and as close as practical to the left-hand kerb but not","You must park parallel and as close as practical to the left-hand kerb, and not within 10 metres of an intersection.","As close to the centre of the road as practical."],c:2,exp:"Park parallel to the kerb on the left-hand side, not within 10 metres of an intersection, and not on yellow lines.",src:"Tasmanian Road Rules 2022, Section 13 (p. 58)"},
  {n:111,id:"g109",topic:"Speed Limits & Signs",q:"How close to a pedestrian crossing can you legally park?",img:"109",opts:["20 metres before and 10 metres after the crossing.","3 metres before and 5 metres after the crossing.","5 metres on either side.","15 metres on either side."],c:0,exp:"You must not park within 20 metres before or 10 metres after a pedestrian crossing.",src:"Tasmanian Road Rules 2022, Section 13 (p. 60)"},
  {n:112,id:"g111",topic:"Speed Limits & Signs",q:"A yellow line along the side of the road means –",img:null,opts:["Parking for taxis only.","Stopping not allowed during peak traffic hours.","Fire hydrant indicator.","No stopping or parking."],c:1,exp:"A yellow line indicates no stopping or parking at any time.",src:"Tasmanian Road Rules 2022, Section 13 (p. 60)"},
  {n:113,id:"g152",topic:"Speed Limits & Signs",q:"Can you legally drive over the speed limit?",img:null,opts:["Yes, at any time as long as the driver does not go over the speed limit by 10","Yes, when the driver is overtaking a slower moving vehicle.","No.","Yes, when the driver has a good excuse."],c:2,exp:"You must never travel faster than the speed limit. This applies at all times, including when overtaking.",src:"Tasmanian Road Rules 2022, Section 6 (p. 20)"},
  {n:114,id:"g153",topic:"Speed Limits & Signs",q:"When following another vehicle in a lane of traffic, what distance is a useful guide to estimate the minimum safe following distance for dry road conditions?",img:null,opts:["Leave a 2-second time gap between you and the other vehicle.","Leave a 3-second time gap between you and the other vehicle.","Leave a 5-second time gap between you and the other vehicle.","Leave a 7-second time gap between you and the other vehicle."],c:1,exp:"A 3-second time gap provides enough time to avoid a crash. In poor conditions, increase this distance.",src:"Tasmanian Road Rules 2022, Section 3 (p. 6)"},
  {n:115,id:"g154",topic:"Speed Limits & Signs",q:"Which one of the following statements is true?",img:null,opts:["Provided you do not exceed the speed the limit you are always driving safely.","In certain situations and conditions driving at the speed limit may be","Speed limits can be exceeded by up to 10km/h if the road and weather","Speed limits can be exceeded if you have a lawful excuse."],c:1,exp:"Speed limits are maximums only. You should drive below the limit when roads are wet, narrow, or conditions are poor.",src:"Tasmanian Road Rules 2022, Section 6 (p. 20)"},
  {n:116,id:"g162",topic:"Speed Limits & Signs",q:"What should you do when driving in wet conditions?",img:null,opts:["Drive with the handbrake on.","Drive closer to vehicles to avoid back splash from the other vehicle.","Slow down as you need to allow much longer for stopping to avoid other vehicles and pedestrians.","As long as you are driving at the speed limit, you are driving safely."],c:2,exp:"In wet conditions, increase your following distance and reduce speed. Wet roads increase stopping distances significantly.",src:"Tasmanian Road Rules 2022, Section 6 (p. 20)"},
  {n:117,id:"g169",topic:"Speed Limits & Signs",q:"Which statement is true?",img:null,opts:["Speeding never causes crashes.","Factors like road and weather conditions can affect a car’s stopping distance.","It is legal to travel 10 km/h over the speed limit.","When it’s raining, you need to reduce your following distance."],c:1,exp:"Road and weather conditions significantly affect stopping distances. Wet roads, poor visibility, and gravel increase stopping distances.",src:"Tasmanian Road Rules 2022, Section 6 (p. 20)"},
  {n:118,id:"g11",topic:"Pedestrians & Vulnerable Road Users",q:"What is the maximum blood-alcohol content (B.A.C) for a learner driver?",img:null,opts:[".05%.",".02%.",".08%.","Zero."],c:2,exp:"Learner drivers must maintain zero blood-alcohol content at all times.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:119,id:"g20",topic:"Pedestrians & Vulnerable Road Users",q:"Which of the following statements is true?",img:null,opts:["It is safe to drive after taking medications prescribed by a doctor.","Medicines bought over the counter do not affect your driving.","Some medications taken in combination with alcohol cause increased","It is safe to drive after taking medications if you take less than the suggested dosage."],c:2,exp:"Some medications taken in combination with alcohol cause increased drowsiness, severely impairing driving ability.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:120,id:"g21",topic:"Pedestrians & Vulnerable Road Users",q:"Which of the following statements is true?",img:null,opts:["Medication taken with alcohol does not increase the effect of the alcohol","You should ask your doctor or pharmacist about how your medication may","There are no medications with side-effects which will affect your driving","If a doctor prescribes your medication then it will enhance your driving"],c:1,exp:"Medical professionals provide vital information on drug side effects and their impact on driving ability.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:121,id:"g22",topic:"Pedestrians & Vulnerable Road Users",q:"Which of the following statements is true?",img:null,opts:["You should start a long trip after a long period of work.","It is best to drive on a long trip during the night or early mornings.","Taking breaks from driving during a long trip will make you more tired.","You should take regular, 10 minute breaks on a long trip."],c:3,exp:"Regular breaks prevent fatigue-related crashes by keeping you alert on long trips.",src:"Tasmanian Road Rules 2022, Section 1 (p. 2)"},
  {n:122,id:"g23",topic:"Pedestrians & Vulnerable Road Users",q:"If you have not slept for 24 hours",img:null,opts:["You have the same crash risk as a driver with a blood alcohol content of twice the legal limit.","It has no real effect on your driving.","You should turn up the music to keep you alert.","Your driving ability will be increased."],c:0,exp:"After 24 hours without sleep, your crash risk equals driving with twice the legal alcohol limit.",src:"Tasmanian Road Rules 2022, Section 1 (p. 2)"},
  {n:123,id:"g24",topic:"Pedestrians & Vulnerable Road Users",q:"Which of the following statements is true?",img:null,opts:["You should only adjust your radio/CD/DVD/Music Player while driving if you are good at multitasking.","You should limit distractions by spending a few minutes getting organised before starting your journey.","You should only check text messages at the traffic lights.","As long as you keep one hand on the steering wheel, it is OK to check your mobile phone."],c:1,exp:"Organise music, GPS and other settings before driving to minimise distractions while on the road.",src:"Tasmanian Road Rules 2022, Section 3 (p. 7)"},
  {n:124,id:"g25",topic:"Pedestrians & Vulnerable Road Users",q:"Before you drive a car, you should check that –",img:null,opts:["It is registered.","It is roadworthy.","It is registered and roadworthy.","Whether the previous driver had committed a traffic offence in it."],c:2,exp:"Both registration and roadworthiness are legal requirements for vehicles to be driven on roads.",src:"Tasmanian Road Rules 2022, Section 9 (p. 37)"},
  {n:125,id:"g26",topic:"Pedestrians & Vulnerable Road Users",q:"You have a driver licence and you change your home (residential) address. You need to –",img:null,opts:["Do nothing until your driver licence expires.","Contact Service Tasmania within one month.","Do nothing.","Contact Service Tasmania within 14 days."],c:3,exp:"You must notify the Department of State Growth within 14 days of changing your residential address.",src:"Department of State Growth"},
  {n:126,id:"g27",topic:"Pedestrians & Vulnerable Road Users",q:"Which of the following statements is true? A car learner driver may only drive:",img:null,opts:["With a current Australian full (not provisional or overseas) licensed driver who has not been suspended","During daylight hours.","With a provisional driver.","With a driver who is at least 25 years of age."],c:0,exp:"A learner supervisor must hold a current full Australian licence and have held it for at least 2 years continuously without suspension.",src:"Department of State Growth"},
  {n:127,id:"g28",topic:"Pedestrians & Vulnerable Road Users",q:"Which of the following statements is true?",img:null,opts:["Ecstasy, marijuana (cannabis) and heroin have no effect on your ability to safely control your car.","The effect of drugs like speed or ecstasy makes you over confident, so you take risks while driving.","Small amounts of marijuana and alcohol enable you to respond quicker in emergency situations.","The use of recreational drugs has no impact on your driving ability."],c:1,exp:"Drugs like speed/ecstasy cause overconfidence, leading to risky driving behaviour and increased crash risk.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:128,id:"g29",topic:"Pedestrians & Vulnerable Road Users",q:"If you are taking several medications and you want to drive you should –",img:null,opts:["Ask your passengers to let you know if you are not driving as well as you should.","Ask your doctor if the combination of drugs will make it dangerous to drive.","Drive carefully around your local streets to see if you are affected.","Drive as normal since all medications are safe and will not affect your driving ability."],c:1,exp:"Always consult your doctor or pharmacist about how medications, especially in combination, may affect your driving ability.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:129,id:"g30",topic:"Pedestrians & Vulnerable Road Users",q:"Your driver licence has a condition that you must wear visual aids (such as glasses) when driving, you -",img:null,opts:["Must wear visual aids when driving.","Must wear visual aids when you have them with you.","Do not have to wear visual aids if your optometrist says that you do not need to them anymore.","Don’t have to wear visual aids."],c:1,exp:"Licence conditions are legal requirements. You must comply with visual aid conditions at all times when driving.",src:"Department of State Growth"},
  {n:130,id:"g31",topic:"Pedestrians & Vulnerable Road Users",q:"What does a car licence allow you to drive?",img:null,opts:["A motor vehicle (other than a motorcycle) with a GVM of 4.5 tonnes or less, seating no more than 12","Any vehicle registered as a car or motorcycle.","Any motor vehicle or combination of motor vehicles.","Any motor vehicle (other than a motorcycle) with a GVM greater than 4.5 tonnes."],c:0,exp:"A car licence covers vehicles with a GVM of 4.5 tonnes or less, seating no more than 12 adults.",src:"Department of State Growth"},
  {n:131,id:"g32",topic:"Pedestrians & Vulnerable Road Users",q:"A car learner driver can NOT -",img:null,opts:["Drive during night time hours.","Drive in wet conditions.","Tow another vehicle including a trailer.","Drive on a highway."],c:1,exp:"Learner drivers cannot tow vehicles or trailers due to the additional skills required.",src:"Tasmanian Road Rules 2022, Section 19 (p. 73)"},
  {n:132,id:"g33",topic:"Pedestrians & Vulnerable Road Users",q:"The blood alcohol content for a fully (non-provisional) licensed driver must be below -",img:null,opts:[".05%.",".08%.","Zero.",".10%."],c:1,exp:"The legal limit for fully licensed drivers is 0.05% blood-alcohol content.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:133,id:"g34",topic:"Pedestrians & Vulnerable Road Users",q:"A learner or provisional (P1 and P2) driver’s maximum blood alcohol content is -",img:null,opts:[".05%.",".08%.","Zero.",".10%."],c:2,exp:"Learner and provisional drivers (L, P1, P2) must maintain zero blood-alcohol content at all times.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:134,id:"g35",topic:"Pedestrians & Vulnerable Road Users",q:"You have a car learner licence, so you –",img:null,opts:["Must only display one ‘L’ plate so that it can be clearly seen from the front of the vehicle.","Must only display one ‘L’ plate so that it can be clearly seen from the rear of the vehicle.","Are not required to display L-plates when accompanied by a supervising driver.","Must display ‘L’ plates so that they can be clearly seen from the front and the rear of the vehicle."],c:3,exp:"L-plates visible from front and rear alert other road users to a learner driver\'s presence.",src:"Department of State Growth"},
  {n:135,id:"g36",topic:"Pedestrians & Vulnerable Road Users",q:"You have a car provisional licence for less than one year (P1 licence), so you –",img:null,opts:["Must display one ‘P’ plate so that it can be clearly seen from the front of the vehicle.","Must display one ‘P’ plate so that it can be clearly seen from the rear of the vehicle.","Must display ‘P’ plates so that they can be clearly seen from the front and the rear of the vehicle.","Are not required to display P plates when accompanied by a passenger over 25 years old."],c:2,exp:"P-plates visible from front and rear alert other road users that the driver is in their first year of provisional driving.",src:"Department of State Growth"},
  {n:136,id:"g37",topic:"Vehicle Safety & Legal Requirements",q:"You set out on a fairly long drive to see some friends. After a while you start feeling tired. What should you do?",img:null,opts:["Turn the music up louder to keep you alert.","Take regular, 10 minute breaks throughout the long trip.","Stop at a shop and get a drink that contains caffeine to help you keep awake.","Make sure you get plenty of fresh air circulating inside the car by winding down the window."],c:3,exp:"If you feel drowsy, stop driving immediately and rest. Opening windows or radio don\'t address fatigue.",src:"Tasmanian Road Rules 2022, Section 1 (p. 2)"},
  {n:137,id:"g38",topic:"Vehicle Safety & Legal Requirements",q:"If you are involved in a crash and a vehicle is damaged but no one is injured you must –",img:null,opts:["Stop at the crash, exchange names, addresses and registration numbers and any other information to identify the vehicle with the driver of the other vehicle as soon as possible, and within 24 hours.","Continue driving as no one had been injured.","Stop only during daylight hours.","Only stop to give your details if you caused the accident."],c:0,exp:"After a crash causing property damage, you must exchange details with the other driver within 24 hours.",src:"Tasmanian Road Rules 2022, Section 18 (p. 72)"},
  {n:138,id:"g39",topic:"Vehicle Safety & Legal Requirements",q:"If you are involved in a crash and someone is injured, you must –",img:null,opts:["Drive to the nearest Police station.","Look for a witness to the accident.","Drive on, you are not injured.","Stop your vehicle immediately and give assistance. If you need to get help,"],c:3,exp:"Stop immediately at injury crashes, give assistance, and if getting help, leave a responsible person at the scene.",src:"Tasmanian Road Rules 2022, Section 18 (p. 72)"},
  {n:139,id:"g40",topic:"Vehicle Safety & Legal Requirements",q:"When driving, you must carry your licence –",img:null,opts:["Only when towing a trailer.","During daylight hours only.","When you remember it.","At all times."],c:1,exp:"You must carry your driver\'s licence at all times when driving and produce it to police on request.",src:"Department of State Growth"},
  {n:140,id:"g41",topic:"Vehicle Safety & Legal Requirements",q:"What is the minimum continuous period that you must hold a novice car learner licence before progressing to a P1 licence?",img:null,opts:["3 continuous months.","6 continuous months.","9 continuous months.","12 continuous months."],c:3,exp:"You must hold a learner licence for a minimum of 12 continuous months before progressing to a P1 licence.",src:"Department of State Growth"},
  {n:141,id:"g42",topic:"Vehicle Safety & Legal Requirements",q:"You are driving on a divided road and see an emergency vehicle on the other side of the road with lights flashing. There is no dividing barrier. What must you do?",img:null,opts:["Slow down to 10km/h below the speed limit.","Stop and offer assistance.","Slow down to 40km/h as you pass.","No need to slow down as it is on the other side for the road."],c:2,exp:"Slow to 40 km/h when passing emergency vehicles with flashing lights, unless a median strip separates the divided road.",src:"Tasmanian Road Rules 2022, Section 6 (p. 23)"},
  {n:142,id:"g43",topic:"Vehicle Safety & Legal Requirements",q:"When driving at night, you must dip your headlights –",img:null,opts:["Only when another vehicle is approaching you from the opposite direction","Within 200 metres when approaching another vehicle from either the opposite direction or from behind.","Within 3 metres when approaching another vehicle from either the opposite","You never need to dip your headlights."],c:1,exp:"You must use low beam headlights within 200 metres of another vehicle from either direction to prevent dazzling other drivers.",src:"Tasmanian Road Rules 2022, Section 15 (p. 66)"},
  {n:143,id:"g44",topic:"Vehicle Safety & Legal Requirements",q:"At a railway crossing with red lights flashing, you must –",img:"44",opts:["Slow down and cross with care.","Stop and wait until the red lights stop flashing and the train passes before driving on.","Cross only if there is no train visible.","Speed up and quickly go through the crossing before the train passes. 7"],c:1,exp:"At a railway crossing with red lights flashing, stop and wait until the lights stop flashing before proceeding.",src:"Tasmanian Road Rules 2022, Section 11 (p. 51)"},
  {n:144,id:"g45",topic:"Vehicle Safety & Legal Requirements",q:"An emergency vehicle (e.g. ambulance or fire engine) is sounding its siren and quickly approaching your vehicle from behind. You must –",img:null,opts:["Immediately turn on your vehicles hazard lights.","Immediately sound your horn to warn other vehicles of the approaching","Immediately accelerate.","Give way by either pulling over to the side of the road or moving into another lane to enable the emergency vehicle to pass."],c:3,exp:"Always give way to emergency vehicles with sirens by moving aside to allow them to pass safely.",src:"Tasmanian Road Rules 2022, Section 7 (p. 27)"},
  {n:145,id:"g47",topic:"Vehicle Safety & Legal Requirements",q:"Who, apart from cyclists, can use a bicycle path?",img:null,opts:["Any vehicle.","If signs don’t say otherwise, a person in a wheelchair or pushing a wheelchair","Motorcyclists.","Courier vans."],c:1,exp:"Wheelchair users, roller blades/skates users and skateboarders can use bicycle paths, but not motorised vehicles.",src:"Tasmanian Road Rules 2022, Section 16 (p. 69)"},
  {n:146,id:"g48",topic:"Vehicle Safety & Legal Requirements",q:"You hold a novice learner licence, when can you use a mobile phone while sitting in the driver’s seat?",img:null,opts:["At any time if using hands free.","At any time, when the phone call is less than 5 minutes long.","When you are stopped at traffic lights or stopped in traffic.","Only when your vehicle is parked."],c:2,exp:"Learner drivers are banned from all mobile phone use while driving, even hands-free and when stationary in traffic.",src:"Tasmanian Road Rules 2022, Section 3 (p. 7)"},
  {n:147,id:"g61",topic:"Vehicle Safety & Legal Requirements",q:"You are behind a long vehicle (7.5 m or more in length) that is signalling and starting to turn left. The truck is displaying a ‘Do not overtake turning vehicle’ sign and is in the second lane from the left side of the road. You also want to turn left. What must you do?",img:"61",opts:["Use the far left lane to pass the truck and turn left.","Sound your horn and quickly pass the truck on the left before the truck turns.","Allow the truck to complete its turn before you turn left.","Indicate and quickly pass the truck on the right hand side before the truck"],c:2,exp:"When a long vehicle displays a \'Do not overtake turning vehicle\' sign while turning, allow it to complete the turn safely.",src:"Tasmanian Road Rules 2022, Section 12 (p. 55)"},
  {n:148,id:"g73",topic:"Vehicle Safety & Legal Requirements",q:"You are driving Car A. You want to move from the side of the road into a line of traffic, you must indicate –",img:"73",opts:["For one second and give way to all traffic","For 3 seconds and give way to all traffic","For 5 seconds and give way to all traffic","Only if there is traffic coming"],c:1,exp:"When moving into traffic, you must indicate at least 5 seconds before and give way to all traffic.",src:"Tasmanian Road Rules 2022, Section 9 (p. 35)"},
  {n:149,id:"g74",topic:"Vehicle Safety & Legal Requirements",q:"You are driving Car A. You want to move to the right hand lane. You must –",img:"74",opts:["Indicate to the right and give way to traffic in the right hand lane.","Give way to traffic in the right hand lane without indicating.","Indicate to the left.","Indicate to the right without giving way."],c:0,exp:"Always indicate your intention to change lanes and give way to traffic in the lane you are entering.",src:"Tasmanian Road Rules 2022, Section 7 (p. 24)"},
  {n:150,id:"g77",topic:"Vehicle Safety & Legal Requirements",q:"At what age do you have to wear a seatbelt or suitable child restraint?",img:null,opts:["All ages.","Age 1 year and over.","Age 8 years and over","Under the age of 65."],c:2,exp:"Seatbelts and child restraints must be worn by people of all ages in all seating positions.",src:"Tasmanian Road Rules 2022, Section 3 (p. 6)"},
  {n:151,id:"g78",topic:"Vehicle Safety & Legal Requirements",q:"Who will be fined if a passenger under the age of 16 is not wearing a seat belt or suitable child restraint?",img:null,opts:["The driver of the vehicle.","The passenger.","The owner of the vehicle.","Everyone in the vehicle."],c:1,exp:"The driver is responsible and will be fined if an under-16 passenger is not wearing a seatbelt.",src:"Tasmanian Road Rules 2022, Section 3 (p. 6)"},
  {n:152,id:"g79",topic:"Vehicle Safety & Legal Requirements",q:"When is the driver of a motor vehicle (not a novice learner or P1 licence holder) allowed to use a mobile phone?",img:null,opts:["When they are certain they will not lose concentration for more than 5","When the traffic is stationary or moving at less than 20kms per hour.","When the vehicle is parked with the engine off, or when the mobile phone is in a commercially designed holder and is fixed to the vehicle, or when it can be operated without being touched.","Any time as long as one hand remains on the steering wheel at all times"],c:2,exp:"Full licence drivers can use phones only when parked with engine off, in a fixed holder, or hands-free.",src:"Tasmanian Road Rules 2022, Section 3 (p. 7)"},
  {n:153,id:"g80",topic:"Vehicle Safety & Legal Requirements",q:"Seatbelts –",img:null,opts:["Must be worn by drivers and passengers when travelling forward or stationary in traffic.","Only need to be worn when travelling over 50km/h.","Do not need to be worn by passengers.","Do not need to be worn by passengers under the age of 12 years."],c:0,exp:"Seatbelts must be worn when travelling or stationary in traffic (except when reversing).",src:"Tasmanian Road Rules 2022, Section 3 (p. 6)"},
  {n:154,id:"g81",topic:"Vehicle Safety & Legal Requirements",q:"As a driver, you must wear a seatbelt –",img:null,opts:["When travelling over 60 km/h.","When convenient.","At all times.","When the vehicle is moving or stationary in traffic, unless reversing."],c:3,exp:"Drivers must wear seatbelts when moving or stationary in traffic, unless actively performing a reversing manoeuvre.",src:"Tasmanian Road Rules 2022, Section 3 (p. 6)"},
  {n:155,id:"g82",topic:"Vehicle Safety & Legal Requirements",q:"What is the maximum speed a learner driver can drive in a 100 km/h speed zone?",img:"82",opts:["110 km/h","90 km/h","100 km/h","80 km/h"],c:2,exp:"Learner drivers must not exceed 90 km/h, even in higher speed zones.",src:"Tasmanian Road Rules 2022, Section 6 (p. 21)"},
  {n:156,id:"g83",topic:"Vehicle Safety & Legal Requirements",q:"As a P1 licence holder, what is the maximum speed you can drive on a road with this sign?",img:"83",opts:["110 km/h","90 km/h","100 km/h","80 km/h"],c:1,exp:"P1 holders must not exceed 100 km/h, even in higher speed zones.",src:"Tasmanian Road Rules 2022, Section 6 (p. 21)"},
  {n:157,id:"g155",topic:"Vehicle Safety & Legal Requirements",q:"If you feel drowsy when driving what should you do?",img:null,opts:["Open the window and turn the radio on.","Drink lots of coffee whilst driving.","Turn the radio up loud.","Stop driving and have a break."],c:3,exp:"If you feel drowsy, stop driving immediately and rest. Opening windows or radio don\'t address fatigue.",src:"Tasmanian Road Rules 2022, Section 1 (p. 2)"},
  {n:158,id:"g156",topic:"Vehicle Safety & Legal Requirements",q:"If you are taking prescription drugs and you want to drive, you –",img:null,opts:["Should check the labelling to see if it is a non-drowsy medication and only drive if it is a non-drowsy","Can drive because it is not a recreational drug.","Can drive during daylight hours but not at night.","Can drive but you should drink coffee to keep you alert."],c:0,exp:"Always check medication labelling for side effects and consult your doctor or pharmacist before driving.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:159,id:"g157",topic:"Vehicle Safety & Legal Requirements",q:"What should you do when you see animals on the road at night?",img:null,opts:["Slow down and be prepared to avoid the animal.","Sound you horn.","Swerve violently.","Speed up to pass them quickly."],c:0,exp:"Slow down when you see animals on the road to give yourself time to avoid them safely.",src:"Tasmanian Road Rules 2022, Section 7 (p. 29)"},
  {n:160,id:"g158",topic:"Vehicle Safety & Legal Requirements",q:"Which of the following statements is true?",img:null,opts:["Drinking alcohol increases your concentration when driving.","Driving with a blood alcohol content over .05 is legal.","You can only drink and drive while you have your learner licence.","The risk of causing a crash increases as your blood alcohol content rises."],c:3,exp:"Alcohol impairs driving ability. As blood alcohol content increases, crash risk increases significantly.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:161,id:"g159",topic:"Vehicle Safety & Legal Requirements",q:"If a seatbelt has been used in a severe crash -",img:null,opts:["It must be replaced.","It needs to be tested by a mechanic.","It will be fine to continue to use the seatbelt.","As long as it does not look damaged you can still use it."],c:0,exp:"A seatbelt used in a severe crash must be replaced. Even if undamaged, its protective effectiveness may be compromised.",src:"Tasmanian Road Rules 2022, Section 3 (p. 6)"},
