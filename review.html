  {n:162,id:"g160",topic:"Vehicle Safety & Legal Requirements",q:"Which of the following statements is correct?",img:null,opts:["If you have been drinking alcohol, it is better not to drive.","Taking prescribed drugs may reduce the effects of alcohol on the body.","Drinking coffee helps reduce the effects of alcohol on your body.","Having a shower may reduce the effects of alcohol on your body."],c:0,exp:"Alcohol impairs driving ability. You should not drive after drinking. Coffee, showers and drugs don\'t reduce alcohol\'s effects.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:163,id:"g161",topic:"Vehicle Safety & Legal Requirements",q:"Can medication used for hay fever or travel sickness affect your driving?",img:null,opts:["No, unless it has been prescribed by a doctor.","No","Yes.","Yes, but only if you’ve had no sleep the night before"],c:2,exp:"Medications for hay fever and travel sickness commonly cause drowsiness and other side effects that can impair driving.",src:"Tasmanian Road Rules 2022, Section 20 (p. 74)"},
  {n:164,id:"g163",topic:"Vehicle Safety & Legal Requirements",q:"Speeding is dangerous because -",img:null,opts:["The faster you drive the more time and space you need to stop.","Increasing speed also increases the severity of crashes.","Driving too fast around a corner can affect the car’s stability.","All of the above."],c:3,exp:"Speeding increases stopping distances, increases crash severity, and reduces control around corners.",src:"Tasmanian Road Rules 2022, Section 1 (p. 2)"},
  {n:165,id:"g164",topic:"Vehicle Safety & Legal Requirements",q:"If an oncoming car’s headlights dazzle you, what should you do?",img:null,opts:["Keep driving and looking at oncoming lights, your eyes will adjust.","Put your high beam on.","Keep your eyes on the left-hand side of the road, slow down or stop.","Turn your lights off."],c:2,exp:"If dazzled by oncoming headlights, focus on the edge of the road and avoid looking directly at the lights. Slow down or stop if necessary.",src:"Tasmanian Road Rules 2022, Section 15 (p. 66)"},
  {n:166,id:"g165",topic:"Vehicle Safety & Legal Requirements",q:"Which of the following statements is true?",img:null,opts:["Driving with a talkative passenger will overcome your fatigue.","You will feel more tired if you make stops on long trips.","You are more likely to become fatigued on short curving roads.","You should not drive if you are tired."],c:3,exp:"Fatigue is one of the top five causes of crashes. If you feel tired, you should not drive. Rest is the only effective solution.",src:"Tasmanian Road Rules 2022, Section 1 (p. 2)"},
  {n:167,id:"g166",topic:"Vehicle Safety & Legal Requirements",q:"If one of your tyres has a blowout what should you do?",img:null,opts:["Accelerate to regain control.","Quickly apply the hand brake.","Brake gently and bring the car to a stop.","Sound your horn."],c:2,exp:"If a tyre blows out, brake gently to maintain control and bring the car safely to a stop.",src:"General safety guidance"},
  {n:168,id:"g167",topic:"Vehicle Safety & Legal Requirements",q:"Which of the following statements is true?",img:null,opts:["If there are not enough seat belts then it is OK to share one.","Passengers in rear seats of a vehicle are not required to wear seat belts.","It is OK to hold the seat belt around you if you cannot find the clasp under the seat to secure it","Passengers in vehicles are less likely to be injured in a crash if they are wearing seat belts."],c:3,exp:"Seatbelts are the best way to reduce serious injury in a crash. All passengers must wear properly fastened seatbelts.",src:"Tasmanian Road Rules 2022, Section 3 (p. 6)"},
  {n:169,id:"g168",topic:"Vehicle Safety & Legal Requirements",q:"Which of the following statements is true?",img:null,opts:["Ornaments hanging from the rear view mirror will stop you becoming fatigued when you are driving.","A novice learner driver can tow a trailer.","You should take extra care looking for cyclists or pedestrians at night.","You should rev your engine when approaching a cyclist to alert them of your approach."],c:2,exp:"At night, visibility is reduced. You should drive carefully and watch for cyclists and pedestrians.",src:"Tasmanian Road Rules 2022, Section 15 (p. 66)"},
  {n:170,id:"g170",topic:"Vehicle Safety & Legal Requirements",q:"Which one of the following statements for a car learner driver is correct?",img:null,opts:["You must have only one passenger in the car.","You must drive only during daylight hours.","You need to get lots of supervised driving experience in a variety of road conditions3",""],c:2,exp:"The learner period is designed to expose you to a wide spectrum of driving environments under full supervision to build competency.",src:"Department of State Growth"},
  {n:171,id:"m1",topic:"Motorcycle-Specific Rules",q:"What is the legal maximum speed for a learner motorcycle rider on the open road?",img:null,opts:["80 km/h","100 km/h","90 km/h","50 km/h"],c:0,exp:"Learner and P1 provisional motorcycle licence holders must not ride faster than 80 km/h, even when a higher speed limit applies.",src:"Tasmanian Transport Services"},
  {n:172,id:"m2",topic:"Motorcycle-Specific Rules",q:"How many pillion passengers can a fully licensed motorcycle rider carry?",img:null,opts:["Two passengers","One passenger; must be 8+ with approved seat/footrests","Three passengers","Only during daylight hours"],c:1,exp:"Only one pillion passenger can be carried on a motorcycle. The passenger must be at least 8 years old and have an approved seat with footrests.",src:"Motorcycle Riders\' Handbook"},
  {n:173,id:"m3",topic:"Motorcycle-Specific Rules",q:"What is the legal maximum speed limit (unless signposted otherwise) for a motorcyclist in a built-up area?",img:null,opts:["40 km/h","60 km/h","50 km/h","80 km/h"],c:2,exp:"The default speed limit in built-up areas is 50 km/h for all road users, including motorcyclists.",src:"Tasmanian Road Rules 2022"},
  {n:174,id:"m4",topic:"Motorcycle-Specific Rules",q:"What is the legal maximum speed limit (unless signposted otherwise) for a fully (non-provisionally) licensed motorcyclist on the open road?",img:null,opts:["80 km/h","90 km/h","100 km/h sealed; 80 km/h unsealed","110 km/h"],c:2,exp:"Under the Tasmanian Road Rules 2019, the default maximum speed limit on a sealed open road is 100 km/h. The default limit on unsealed roads is 80 km/h.",src:"Tasmanian Road Rules 2019"},
  {n:175,id:"m5",topic:"Motorcycle-Specific Rules",q:"A learner motorcycle rider is allowed to ride:",img:null,opts:["Any motorcycle available","LAMS-approved motorcycles only","Motorcycles under 500cc","Motorcycles with instructor only"],c:1,exp:"Learner riders must ride only LAMS-approved motorcycles. Not all bikes within capacity limits are automatically approved - they must be on the official LAMS list.",src:"Tasmanian Transport Services"},
  {n:176,id:"m6",topic:"Motorcycle-Specific Rules",q:"Motorcycle riders must ride:",img:null,opts:["No more than 2 abreast within one lane, unless overtaking","In single file always","No more than 3 across","Wherever they fit"],c:0,exp:"Motorcycle riders must not ride more than 2 abreast within one lane. Riders can position themselves to improve visibility and safety.",src:"Tasmanian Road Rules 2022 & Transport Services"},
  {n:177,id:"m7",topic:"Motorcycle-Specific Rules",q:"You are riding the motorcycle and standing stationary at a traffic light controlled intersection on a single-lane road. Can you lane filter?",img:"m7",opts:["Yes, if the traffic light is green","Yes, if you lane filter at no more than 30km/hr","Yes, if you lane filter at the speed limit","No, lane filtering is illegal on a single-lane road"],c:3,exp:"Lane filtering is only safe when there is adequate space. If blocked, wait for a safer opportunity to filter.",src:"Tasmanian Road Rules 2019 & Road Safety Council"},
  {n:178,id:"m8",topic:"Motorcycle-Specific Rules",q:"What is the legal maximum speed limit (unless signposted) for a first-year provisional motorcyclist (P1 licence) on the open road?",img:null,opts:["80 km/h","100 km/h","90 km/h","110 km/h"],c:0,exp:"P1 provisional motorcycle licence holders must not ride faster than 80 km/h, regardless of the speed limit posted on the road.",src:"Tasmanian Road Rules 2022"},
  {n:179,id:"m9",topic:"Motorcycle-Specific Rules",q:"As a learner motorcycle rider, you must display L plates so that:",img:null,opts:["Front and rear, like car learners","Rear only, clearly visible","Front only","On helmet only"],c:1,exp:"Learner motorcycle riders must display one L plate at the rear. This differs from learner car drivers who need front and rear plates.",src:"Tasmanian Vehicle and Traffic Regulations 2021"},
  {n:180,id:"m10",topic:"Motorcycle-Specific Rules",q:"You are riding the motorcycle. Car A is too close to centre line blocking the opportunity to lane filter. You should:",img:"m10",opts:["Force your way through","Flash lights to signal intent","Stay behind Car A, not safe to lane filter","Lane filter at high speed to pass"],c:2,exp:"When riding the motorcycle, if a car is too close to the centre line blocking your opportunity to lane filter, stay behind. It is not safe to lane filter.",src:"Tasmanian Road Rules 2019"},
  {n:181,id:"m11",topic:"Motorcycle-Specific Rules",q:"What is the minimum continuous period that a motorcycle learner licence must be held before progressing to a motorcycle provisional licence?",img:null,opts:["3 months","6 continuous months","12 continuous months","24 months"],c:1,exp:"Motorcycle learner riders must hold their learner licence for a minimum of 6 continuous months before they are eligible to progress to P1.",src:"Tasmanian Transport Services"},
  {n:182,id:"m12",topic:"Motorcycle-Specific Rules",q:"Which of the following statements is true about lane filtering?",img:null,opts:["It is legal at any speed","It is only legal at speeds of no more than 30 km/h","It is always prohibited","It is only legal on multi-lane roads"],c:1,exp:"Lane filtering is only legal at speeds of no more than 30 km/h. It is prohibited at traffic lights, in school zones, and at pedestrian crossings.",src:"Tasmanian Road Rules 2019 & Road Safety Council"},
  {n:183,id:"m13",topic:"Motorcycle-Specific Rules",q:"Before attempting to lane filter, you should:",img:null,opts:["Check your mirrors only","Ensure sufficient space and you can safely return to your lane","Signal your intention only","Accelerate to build speed"],c:1,exp:"Before lane filtering, always ensure there is sufficient space between vehicles and that you can safely return to your lane.",src:"Tasmanian Road Rules 2019 & Road Safety Council"},
  {n:184,id:"m14",topic:"Motorcycle-Specific Rules",q:"Lane filtering should not occur when:",img:null,opts:["At 30 km/h or less","On a divided road","There is inadequate space to filter safely","Traffic is moving at normal speed"],c:2,exp:"Lane filtering is only safe when there is adequate space. If blocked, wait for a safer opportunity to filter.",src:"Tasmanian Road Rules 2019 & Road Safety Council"}
];

const HANDBOOK_URL="https://www.transport.tas.gov.au/__data/assets/pdf_file/0006/358278/413398_-_Tasmanian_Road_Rules_2022.pdf";
const L=["A","B","C","D"];
let flagged=new Set(JSON.parse(localStorage.getItem("dkt-review-flags")||"[]"));
let filter="all";
let filteredQs=[...ALL_REVIEW_QS];
let cur=0;

function saveFlags(){localStorage.setItem("dkt-review-flags",JSON.stringify([...flagged]));}
function imgP(id){return "images/q"+id+".png";}

function setFilter(f){
  filter=f;
  document.getElementById("btnAll").className="fbtn"+(f==="all"?" active":"");
  document.getElementById("btnFlagged").className="fbtn"+(f==="flagged"?" flag-active":"");
  filteredQs=f==="flagged"?ALL_REVIEW_QS.filter(q=>flagged.has(q.id)):[...ALL_REVIEW_QS];
  cur=0;
  render();
}

function updateFlagCount(){
  const el=document.getElementById("flagCount");
  if(el)el.textContent=flagged.size?"("+flagged.size+")":"";
}

function jumpTo(){
  const v=parseInt(document.getElementById("jumpInput").value);
  if(isNaN(v)||v<1||v>184)return;
  if(filter!=="all"){setFilter("all");}
  const idx=filteredQs.findIndex(q=>q.n===v);
  if(idx>=0){cur=idx;render();window.scrollTo({top:0,behavior:"smooth"});}
}

function move(d){
  cur=Math.max(0,Math.min(filteredQs.length-1,cur+d));
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function toggleFlag(id){
  if(flagged.has(id))flagged.delete(id);else flagged.add(id);
  saveFlags();
  updateFlagCount();
  const btn=document.getElementById("flagBtn");
  if(btn){
    const f=flagged.has(id);
    btn.className="flag-btn"+(f?" flagged":"");
    btn.innerHTML=(f?"&#128681; Flagged":"&#128681; Flag this question");
  }
  if(filter==="flagged"){filteredQs=ALL_REVIEW_QS.filter(q=>flagged.has(q.id));renderMeta();}
}

function renderMeta(){
  const total=filteredQs.length;
  const pos=total?(cur+1)+" / "+total:"0 / 0";
  document.getElementById("qCount").textContent=total+" question"+(total!==1?"s":"");
  document.getElementById("navPos").textContent=pos;
  document.getElementById("btnPrev").disabled=cur<=0;
  document.getElementById("btnNext").disabled=cur>=filteredQs.length-1;
  updateFlagCount();
}

function render(){
  renderMeta();
  if(filteredQs.length===0){
    document.getElementById("main").innerHTML=
      '<div class="empty"><div class="empty-icon">&#128681;</div><div class="empty-msg">No flagged questions yet.<br>Tap &#128681; Flag on any question to collect it here.</div></div>';
    return;
  }
  const q=filteredQs[cur];
  const isFlagged=flagged.has(q.id);
  let imgH="";
  if(q.img)imgH='<div class="q-img"><img src="'+imgP(q.img)+'" alt="Diagram" onerror="this.parentElement.style.display=\'none\'"></div>';
  const optsH=q.opts.map((o,i)=>{
    if(!o)return "";
    const isC=i===q.c;
    return '<div class="opt-row'+(isC?" is-correct":"")+'">'
      +'<div class="opt-ltr">'+L[i]+'.</div>'
      +'<div class="opt-chk">'+(isC?"&#10004;&#65039;":"&#9711;")+'</div>'
      +'<div class="opt-txt">'+o+'</div></div>';
  }).join("");
  const srcTxt=q.src?q.src.replace("Tasmanian Road Rules 2022",'<a href="'+HANDBOOK_URL+'" target="_blank" rel="noopener">Tasmanian Road Rules 2022</a>'):"";
  const srcH=q.src?'<div class="exp-src">&#128218; '+srcTxt+'</div>':"";
  document.getElementById("main").innerHTML=
    '<div class="q-card">'
    +'<div class="q-meta"><div class="q-badge">Q'+q.n+'</div><div class="q-topic-tag">'+q.topic+'</div></div>'
    +'<div class="q-text">'+q.q+'</div>'
    +imgH+optsH
    +'<div class="exp-box"><div class="exp-label">&#10004; Explanation</div><div class="exp-text">'+q.exp+'</div>'+srcH+'</div>'
    +'<div class="flag-row"><button class="flag-btn'+(isFlagged?" flagged":"")+'" id="flagBtn" onclick="toggleFlag(\''+q.id+'\')">'
    +(isFlagged?"&#128681; Flagged":"&#128681; Flag this question")+'</button></div>'
    +'</div>';
}

// Theme
function tI(){return document.body.classList.contains("dark")?"&#9728;&#65039;":"&#127769;";}
function tL(){return document.body.classList.contains("dark")?"lights on":"lights off";}
function setBtn(){const b=document.getElementById("themeBtn");if(b)b.innerHTML=tI()+" "+tL();}
function togTheme(){document.body.classList.toggle("dark");localStorage.setItem("dkt-dark",document.body.classList.contains("dark")?"1":"0");setBtn();}
if(localStorage.getItem("dkt-dark")==="1")document.body.classList.add("dark");
setBtn();

// Keyboard nav
document.addEventListener("keydown",function(e){
  if(e.target===document.getElementById("jumpInput"))return;
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")move(-1);
  else if(e.key==="ArrowRight"||e.key==="ArrowDown")move(1);
});

render();
</script>
</body>
</html>
