{id:"m14",q:"Which of the following statements is true?",img:null,opts:["A motorcycle rider can edge filter at a traffic controlled intersection","A motorcycle rider cannot lane filter at a speed more than 30 km/h","A motorcycle rider can lane filter in a school zone","All of the above"],c:1,exp:"Lane filtering must not exceed 30 km/h. It is prohibited in school zones, and edge filtering is not allowed."}];

const SECS=[
  {name:"Compulsory",req:7,tot:7,color:"var(--compC)",hex:"#f97316",pool:COMP},
  {name:"Traffic Rules",req:2,tot:3,color:"var(--traffC)",hex:"#ea580c",pool:TRAF},
  {name:"Road Rules",req:12,tot:15,color:"var(--roadC)",hex:"#2563eb",pool:ROAD},
  {name:"Road Safety",req:2,tot:3,color:"var(--safeC)",hex:"#7c3aed",pool:SAFE},
  {name:"Motorcycle",req:6,tot:7,color:"var(--motoC)",hex:"#059669",pool:MOTO},
];
const L=["A","B","C","D"];
let S={scr:"welcome",qs:[],cur:0,ans:{},fb:false,dk:localStorage.getItem("dkt-dark")==="1"};
if(S.dk)document.body.classList.add("dark");
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function genTest(){let r=[];SECS.forEach(s=>{shuffle(s.pool).slice(0,s.tot).forEach(q=>r.push({...q,section:s.name}));});return r;}
function getRes(qs,ans){return SECS.map(s=>{const sq=qs.filter(q=>q.section===s.name);const c=sq.filter(q=>ans[q.id]===q.c).length;return{...s,correct:c,passed:c>=s.req};});}
function saveHist(qs,ans){const res=getRes(qs,ans);const ap=res.every(r=>r.passed);const tot=qs.filter(q=>ans[q.id]===q.c).length;
  const h=JSON.parse(localStorage.getItem("dkt-history")||"[]");
  h.unshift({date:new Date().toLocaleDateString("en-AU"),time:new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"}),score:tot,passed:ap,secs:res.map(r=>({n:r.name,g:r.correct,t:r.tot,ok:r.passed})),qs:qs.map(q=>({id:q.id,q:q.q,opts:q.opts,c:q.c,exp:q.exp,img:q.img,section:q.section})),ans:ans});
  if(h.length>20)h.pop();localStorage.setItem("dkt-history",JSON.stringify(h));}
function saveProg(){localStorage.setItem("dkt-progress",JSON.stringify({qs:S.qs,cur:S.cur,ans:S.ans}));}
function loadProg(){try{return JSON.parse(localStorage.getItem("dkt-progress"));}catch{return null;}}
function clearProg(){localStorage.removeItem("dkt-progress");}
function imgPath(id){return "images/q"+id+".png";}
const app=document.getElementById("app");
function render(){
  if(S.scr==="welcome")rWelcome();else if(S.scr==="quiz")rQuiz();else if(S.scr==="results")rResults();
  else if(S.scr==="review")rReview();else if(S.scr==="history")rHistory();else if(S.scr==="histDetail")rHistDetail();
  window.scrollTo({top:0,behavior:"smooth"});}
function tIco(){return S.dk?"\u2600\ufe0f":"\ud83c\udf19";}
function tLbl(){return S.dk?"lights on":"lights off";}
function hdrBtns(showH){
  const h=JSON.parse(localStorage.getItem("dkt-history")||"[]");
  return '<div class="header-row">'+(showH&&h.length?'<a class="header-btn" onclick="goHistory()">\ud83d\udcca History</a>':'<span></span>')
    +'<a class="header-btn" onclick="toggleTheme()">'+tIco()+' '+tLbl()+'</a></div>';}

function rWelcome(){
  const prog=loadProg();
  app.innerHTML='<div class="header">'+hdrBtns(true)
    +'<img src="images/logo.png" class="logo-placeholder" onerror="this.style.display=\'none\'">'
    +'<h1>Tasmania Motorcycle<br><span>Practice DKT</span></h1>'
    +'<div class="header-sub">Prepare for your motorcycle knowledge test</div></div>'
    +'<div class="container"><div class="card">'
    +'<div class="welcome-info">There are <b>35 questions</b> in the test divided into <b>5 sections</b>. You must pass each section to achieve an overall test pass.</div>'
    +SECS.map(s=>'<div class="pass-row"><span class="pass-label"><span class="pass-dot" style="background:'+s.color+'"></span>'+s.name+'</span><span class="pass-val">'+s.req+'/'+s.tot+' = Pass</span></div>').join("")
    +'<div class="mt-20">'+(prog?'<button class="btn btn-primary mb-8" onclick="resumeTest()">Continue Test</button><button class="btn btn-outline" onclick="startTest()">Start New Test</button>'
    :'<button class="btn btn-primary" onclick="startTest()">Start Test</button>')+'</div>'
    +'<div class="text-center mt-12" style="color:var(--textL);font-size:12px">* Each attempt draws random questions from a larger bank<br>* You can attempt the test as many times as you like</div>'
    +'</div><div class="text-center" style="color:var(--textL);font-size:11px;margin-top:12px;line-height:1.4">Based on the official Tasmanian DKT question bank.<br>Not affiliated with the Department of State Growth or Service Tasmania.</div></div>';}

function rQuiz(){
  const q=S.qs[S.cur];const sec=SECS.find(s=>s.name===q.section);
  const secQs=S.qs.filter(x=>x.section===q.section);const secIdx=secQs.indexOf(q)+1;
  const answered=S.ans[q.id]!==undefined;const fb=S.fb;
  let img="";if(q.img)img='<div class="q-img-wrap"><img src="'+imgPath(q.img)+'" alt="Diagram" onerror="this.parentElement.innerHTML=\'<div class=q-img-fallback>Image: q'+q.img+'.png not yet added</div>\'"></div>';
  let opts=q.opts.map((o,i)=>{let cls="opt";if(fb){if(i===q.c)cls+=" correct show-correct";else if(S.ans[q.id]===i&&i!==q.c)cls+=" wrong";}else if(S.ans[q.id]===i)cls+=" selected";
    return '<div class="'+cls+'" onclick="selOpt('+i+')"><div class="opt-radio"></div><div class="opt-text">'+o+'</div></div>';}).join("");
  let fbH="";if(fb){const ic=S.ans[q.id]===q.c;fbH='<div class="feedback '+(ic?"correct":"wrong")+'"><div class="feedback-title">'+(ic?"\u2714\ufe0f Correct!":"\u2716\ufe0f Incorrect. The answer is "+L[q.c]+".")+'</div><div class="feedback-exp">'+q.exp+'</div></div>';}
  let nav="";if(!fb)nav='<div class="nav-btns">'+(S.cur>0?'<button class="btn btn-outline" onclick="prevQ()">Back</button>':'')+'<button class="btn btn-primary" '+(answered?"":"disabled")+' onclick="confirmAns()">Confirm</button></div>';
  else nav='<div class="nav-btns"><button class="btn btn-primary" onclick="nextQ()">'+(S.cur<S.qs.length-1?"Next":"See Results")+'</button></div>';
  app.innerHTML='<div class="quiz-bar"><div class="quiz-bar-top"><span class="quiz-section" style="color:'+sec.color+'">'+q.section+' ('+secIdx+'/'+sec.tot+')</span>'
    +'<div class="quiz-tools"><button class="quiz-tool-btn" onclick="goHome()">\ud83c\udfe0 Home</button><button class="quiz-tool-btn" onclick="toggleTheme()">'+tIco()+'</button>'
    +'<span class="quiz-total">'+(S.cur+1)+'/35</span></div></div>'
    +'<div class="progress"><div class="progress-fill" style="width:'+((S.cur+1)/35*100)+'%"></div></div></div>'
    +'<div class="container"><div class="card">'
    +'<div class="q-head"><div class="q-num" style="background:'+sec.color+'">'+(S.cur+1)+'</div><div class="q-text">'+q.q+'</div></div>'
    +img+opts+fbH+nav+'</div></div>';}

function rResults(){
  const res=getRes(S.qs,S.ans);const ap=res.every(r=>r.passed);const tot=S.qs.filter(q=>S.ans[q.id]===q.c).length;
  app.innerHTML='<div class="header">'+hdrBtns(false)+'<h1>'+(ap?"\u2705 Test Passed!":"\u274c Not Yet")+'</h1><div class="header-sub">'+tot+' of 35 correct</div></div>'
    +'<div class="container"><div class="card"><h3 class="mb-16" style="color:var(--textM);text-transform:uppercase;letter-spacing:1px;font-size:13px">Section Breakdown</h3>'
    +res.map(r=>'<div class="section-result '+(r.passed?"pass":"fail")+'"><div class="sr-left"><span class="sr-icon">'+(r.passed?"\u2705":"\u274c")+'</span><div><div class="sr-name">'+r.name+'</div><div class="sr-need">Need '+r.req+' of '+r.tot+'</div></div></div><div class="sr-score" style="color:'+(r.passed?"var(--green)":"var(--red)")+'">'+r.correct+'/'+r.tot+'</div></div>').join("")
    +'<div class="nav-btns mt-20"><button class="btn btn-outline" onclick="showReview()">Review Answers</button><button class="btn btn-primary" onclick="startTest()">New Test</button></div></div></div>';}

function buildRevItems(qs,ans){
  return qs.map((q,i)=>{const ua=ans[q.id];const ic=ua===q.c;
    let body="";if(q.img)body+='<div class="q-img-wrap mb-8"><img src="'+imgPath(q.img)+'" alt="Diagram" onerror="this.parentElement.style.display=\'none\'"></div>';
    body+=q.opts.map((o,j)=>{let icon="\u25cb",style="color:var(--textM)";if(j===q.c){icon="\u2714";style="color:var(--green);font-weight:700"}else if(j===ua&&!ic){icon="\u2716";style="color:var(--red);text-decoration:line-through;opacity:0.7"}
      return '<div style="padding:6px 0;'+style+'">'+icon+' '+o+'</div>';}).join("")
      +'<div class="feedback '+(ic?"correct":"wrong")+'" style="margin-top:10px"><div class="feedback-exp">'+q.exp+'</div></div>';
    return '<div class="review-item" id="rev'+i+'"><div class="review-header" onclick="toggleRev('+i+')"><span class="review-num">'+(i+1)+'</span><span class="review-q">'+q.q+'</span><span class="review-icon">'+(ic?"\u2705":"\u274c")+'<span class="review-chevron">\u25bc</span></span></div><div class="review-body">'+body+'</div></div>';}).join("");}

function rReview(){
  app.innerHTML='<div class="header"><h1>Review Test</h1><div class="header-sub">Tap a question to expand the answer</div></div>'
    +'<div class="container"><div class="card" style="padding:12px">'+buildRevItems(S.qs,S.ans)+'</div>'
    +'<div class="nav-btns mt-12"><button class="btn btn-outline" onclick="S.scr=\'results\';render()">Back to Results</button><button class="btn btn-primary" onclick="startTest()">New Test</button></div></div>';}

function rHistory(){
  const h=JSON.parse(localStorage.getItem("dkt-history")||"[]");
  app.innerHTML='<div class="header">'+hdrBtns(false)+'<h1>\ud83d\udcca Test History</h1><div class="header-sub">'+h.length+' attempt'+(h.length!==1?"s":"")+'</div></div>'
    +'<div class="container"><div class="card" style="padding:0">'
    +(h.length===0?'<div style="padding:24px;text-align:center;color:var(--textM)">No attempts yet. Take your first test!</div>'
    :h.map((a,i)=>'<div class="history-item" onclick="viewHD('+i+')"><div class="history-top"><div><div class="history-date">'+a.date+' '+(a.time||"")+'</div><div class="history-detail">'+a.secs.map(s=>s.n+': '+s.g+'/'+s.t).join(' | ')+'</div><div class="history-tap">Tap to review questions</div></div><div class="'+(a.passed?"history-pass":"history-fail")+'">'+a.score+'/35 '+(a.passed?"PASS":"FAIL")+'</div></div></div>').join(""))
    +'</div><div class="mt-12"><button class="btn btn-primary" onclick="S.scr=\'welcome\';render()">Back</button></div>'
    +(h.length?'<div class="text-center mt-12"><button class="btn btn-outline btn-sm" onclick="if(confirm(\'Clear all history?\')){localStorage.removeItem(\'dkt-history\');S.scr=\'welcome\';render()}">Clear History</button></div>':'')+'</div>';}

function rHistDetail(){
  const h=JSON.parse(localStorage.getItem("dkt-history")||"[]");const a=h[S.histIdx];
  if(!a||!a.qs){S.scr="history";render();return;}
  app.innerHTML='<div class="header"><h1>Review: '+a.date+'</h1><div class="header-sub">'+a.score+'/35 '+(a.passed?"PASS":"FAIL")+'</div></div>'
    +'<div class="container"><div class="card" style="padding:12px">'+buildRevItems(a.qs,a.ans)+'</div>'
    +'<div class="mt-12"><button class="btn btn-outline" onclick="S.scr=\'history\';render()">Back to History</button></div></div>';}

function startTest(){clearProg();S.qs=genTest();S.cur=0;S.ans={};S.fb=false;S.scr="quiz";render();}
function resumeTest(){const p=loadProg();if(p){S.qs=p.qs;S.cur=p.cur;S.ans=p.ans;S.fb=false;S.scr="quiz";render();}}
function selOpt(i){if(S.fb)return;S.ans[S.qs[S.cur].id]=i;render();}
function confirmAns(){if(S.ans[S.qs[S.cur].id]===undefined)return;S.fb=true;saveProg();render();}
function nextQ(){S.fb=false;if(S.cur<S.qs.length-1){S.cur++;saveProg();render();}else{clearProg();saveHist(S.qs,S.ans);S.scr="results";render();}}
function prevQ(){if(S.cur>0){S.cur--;S.fb=S.ans[S.qs[S.cur].id]!==undefined;render();}}
function goHome(){if(confirm("Leave test? Your progress will be saved so you can pick up where you left off.")){saveProg();S.scr="welcome";render();}}
function showReview(){S.scr="review";render();}
function goHistory(){S.scr="history";render();}
function viewHD(i){S.histIdx=i;S.scr="histDetail";render();}
function toggleRev(i){document.getElementById("rev"+i).classList.toggle("open");}
function toggleTheme(){S.dk=!S.dk;document.body.classList.toggle("dark");localStorage.setItem("dkt-dark",S.dk?"1":"0");render();}
render();

</script>
</body>
</html>
