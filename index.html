<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Tasmania Motorcycle Practice DKT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#0d9488;--tealL:#14b8a6;--amber:#f59e0b;--amberD:#d97706;--sky:#e0f2fe;--skyD:#0ea5e9;--skyDD:#0284c7;--green:#10b981;--red:#ef4444;--bg:#f0f9ff;--card:#fff;--text:#1e293b;--textM:#64748b;--textL:#94a3b8;--border:#e2e8f0;--radius:12px;--compC:#f97316;--traffC:#ea580c;--roadC:#2563eb;--safeC:#7c3aed;--motoC:#059669}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:70px}
.header{background:linear-gradient(135deg,var(--skyD),var(--skyDD));color:#fff;text-align:center;padding:16px 16px 20px;position:relative}
.header h1{font-size:24px;font-weight:900;letter-spacing:-0.5px;margin-top:4px}
.header h1 span{color:var(--amber)}.header-sub{margin-top:4px;opacity:0.85;font-size:13px}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.header-btn{background:#fff2;border:1px solid #fff3;border-radius:20px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;color:#fff;font-size:11px;font-weight:600;text-decoration:none}.header-btn:hover{background:#fff3}
.logo-placeholder{display:block;margin:0 auto 8px;max-height:40px;max-width:200px}
.container{max-width:640px;margin:0 auto;padding:0 16px 20px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px #0001,0 4px 12px #0001;padding:24px 20px;margin:20px 0}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 32px;border-radius:var(--radius);border:none;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--amber);color:#fff;width:100%}.btn-primary:hover{background:var(--amberD)}
.btn-outline{background:#fff;color:var(--text);border:2px solid var(--border)}.btn-outline:hover{border-color:var(--textL)}
.btn-sm{padding:8px 16px;font-size:13px}.btn:disabled{opacity:0.4;cursor:default}
.welcome-info{font-size:15px;color:var(--textM);line-height:1.6;margin:12px 0 20px}
.pass-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.pass-row:last-child{border-bottom:none}
.pass-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.pass-label{font-weight:600;font-size:15px;display:flex;align-items:center}.pass-val{font-weight:700;color:var(--textM);font-size:14px}
.quiz-bar{background:#fff;border-bottom:2px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:20}
.quiz-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.quiz-section{font-weight:700;font-size:14px}.quiz-total{font-weight:600;font-size:13px;color:var(--textM)}
.quiz-tools{display:flex;gap:8px;align-items:center}
.quiz-tool-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px;color:var(--textM);font-family:inherit;font-weight:600}.quiz-tool-btn:hover{background:#f1f5f9}
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--tealL));border-radius:3px;transition:width 0.4s ease}
.q-num{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0;color:#fff}
.q-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}.q-text{font-size:18px;font-weight:700;line-height:1.4}
.q-img-wrap{background:#e8f5e9;border-radius:8px;overflow:hidden;margin-bottom:16px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center}
.q-img-wrap img{max-width:100%;height:auto;display:block}.q-img-fallback{padding:16px;color:var(--textL);font-size:13px;font-style:italic}
.opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all 0.15s;background:#fff}
.opt:hover{border-color:var(--textL);background:#fafafa}.opt.selected{border-color:var(--teal);background:#f0fdfa}
.opt.correct{border-color:var(--green);background:#ecfdf5}.opt.wrong{border-color:var(--red);background:#fef2f2}.opt.show-correct{border-color:var(--green);background:#ecfdf5}
.opt-radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.opt.selected .opt-radio{border-color:var(--teal);background:var(--teal)}.opt.selected .opt-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt.correct .opt-radio{border-color:var(--green);background:var(--green)}.opt.correct .opt-radio::after{content:'\2714';color:#fff;font-size:12px}
.opt.wrong .opt-radio{border-color:var(--red);background:var(--red)}.opt.wrong .opt-radio::after{content:'\2716';color:#fff;font-size:12px}
.opt-text{font-size:15px;line-height:1.45;flex:1}
.feedback{padding:16px;border-radius:var(--radius);margin:12px 0 16px;line-height:1.5}
.feedback.correct{background:#ecfdf5;border:2px solid #86efac;color:#065f46}.feedback.wrong{background:#fef2f2;border:2px solid #fca5a5;color:#991b1b}
.feedback-title{font-weight:800;font-size:16px;margin-bottom:4px}.feedback-exp{font-size:14px;opacity:0.9}
.nav-btns{display:flex;gap:12px;margin-top:16px}.nav-btns .btn{flex:1}
.section-result{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:8px;margin-bottom:8px;border:1px solid var(--border)}
.section-result.pass{background:#f0fdf4}.section-result.fail{background:#fef2f2}
.sr-left{display:flex;align-items:center;gap:10px}.sr-icon{font-size:18px}.sr-name{font-weight:700;font-size:15px}.sr-need{font-size:12px;color:var(--textM)}
.sr-score{font-weight:800;font-size:18px}
.review-item{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.review-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;background:#fff;transition:background 0.15s}.review-header:hover{background:#f8fafc}
.review-num{font-weight:800;color:var(--textM);min-width:28px;font-size:15px}.review-q{flex:1;font-size:14px;font-weight:600;line-height:1.35}
.review-icon{font-size:16px;margin-left:auto;padding-left:8px;display:flex;gap:6px;flex-shrink:0}
.review-body{padding:0 16px 16px;display:none}.review-item.open .review-body{display:block}
.review-chevron{transition:transform 0.2s;color:var(--textL);font-size:16px}.review-item.open .review-chevron{transform:rotate(180deg)}
.history-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}.history-item:hover{background:#f8fafc}.history-item:last-child{border-bottom:none}
.history-top{display:flex;justify-content:space-between;align-items:center}.history-date{font-weight:700}
.history-pass{color:var(--green);font-weight:700}.history-fail{color:var(--red);font-weight:700}
.history-detail{font-size:12px;color:var(--textM);margin-top:4px}.history-tap{font-size:11px;color:var(--textL);margin-top:2px}
.footer-strip{position:fixed;bottom:0;left:0;right:0;height:60px;background:linear-gradient(0deg,#1a3a2a 0%,#2d5a3f 40%,#4a8c6a 80%,transparent 100%);z-index:5;pointer-events:none;overflow:hidden}
.footer-road{position:absolute;bottom:18px;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#fff6 0px,#fff6 20px,transparent 20px,transparent 40px)}
.footer-moto{position:absolute;bottom:22px;right:15%;font-size:28px;transform:scaleX(-1)}
body.dark{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--textM:#94a3b8;--textL:#64748b;--border:#334155}
body.dark .header{background:linear-gradient(135deg,#0f172a,#1e293b);border-bottom:1px solid #334155}
body.dark .quiz-bar{background:#1e293b;border-color:#334155}
body.dark .opt{background:#1e293b;border-color:#334155}.dark .opt:hover{background:#263548;border-color:#475569}.dark .opt.selected{background:#0d3331;border-color:var(--teal)}
body.dark .review-header{background:#1e293b}.dark .review-header:hover{background:#263548}
body.dark .q-img-wrap{background:#1a3a2a}.dark .quiz-tool-btn{border-color:#475569;color:#94a3b8}.dark .quiz-tool-btn:hover{background:#334155}
body.dark .history-item:hover{background:#263548}
body.dark .footer-strip{background:linear-gradient(0deg,#0a1a10 0%,#1a3a2a 40%,#2d5a3f 80%,transparent 100%)}
.mt-12{margin-top:12px}.mt-20{margin-top:20px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.text-center{text-align:center}
@media(min-width:500px){.q-text{font-size:20px}.opt-text{font-size:16px}}
</style>
</head>
<body>
<div id="app"></div>
<div class="footer-strip"><div class="footer-road"></div><div class="footer-moto">🏍️</div></div>
<script>
const COMP=[{id:"g1",q:"Can Car A cross the double lines?",img:"g1",opts:["Yes to overtake another vehicle.","Yes - to turn into a driveway.","Yes to pass a cyclist if it’s safe to do so.","Yes to do a U-turn."],c:2,exp:"In Tasmania, you may cross continuous double white lines to enter or leave a road or property, such as a driveway."},
{id:"g2",q:"Which car(s) can cross the lines to overtake (when it’s safe)?",img:"g2",opts:["Car A.","Car B."],c:0,exp:"A driver may only cross a dividing line to overtake if the line immediately adjacent to their lane is broken."},
{id:"g3",q:"You are driving Car A. When can’t you cross the double broken lines?",img:"g3",opts:["When can’t you cross the double broken lines? A. To overtake another vehicle if safe to do so.","To turn into a driveway.","To turn into a road.","To avoid an obstruction on the road."],c:0,exp:"Assuming the source material implies double continuous lines, you are strictly prohibited from crossing them to overtake another vehicle."},
{id:"g4",q:"You are driving Car A. When can’t you cross the single continuous line?",img:"g4",opts:["When can’t you cross the single continuous line? A. To overtake another vehicle if it is safe to do so.","To turn into a driveway.","To turn into a road.","To avoid an obstruction on the road."],c:0,exp:"A single continuous dividing line cannot be crossed for the purpose of overtaking, though crossing to enter/leave a road or avoid an obstruction is permitted."},
{id:"g5",q:"This sign means?",img:"g5",opts:["Stop only if traffic or pedestrians are coming from the right.","Slow down and if it is safe, drive through the intersection.","Stop, only for pedestrians.","Stop at the solid white line at the intersection and give way to vehicles on your left and right and any pedestrians."],c:3,exp:"A STOP sign requires drivers to come to a complete halt at the stop line and give way to all intersecting traffic and pedestrians."},
{id:"g6",q:"This sign means?",img:"g6",opts:["Give way only to traffic on your right. It is a warning sign indicating that drivers may stop if they choose to.","Come to a complete stop and then give way to all vehicles and pedestrians before driving into the intersection.","Slow down and be prepared to stop to give way to traffic on your left and right and pedestrians.","Slow down and be prepared to stop to give way to traffic on your left and right and pedestrians."],c:3,exp:"A GIVE WAY sign mandates that you slow down, prepare to stop, and yield to all intersecting traffic and pedestrians."},
{id:"g7",q:"Car A wants to turn right at an intersection with green traffic lights. It should indicate and -",img:"g7",opts:["Give way to oncoming traffic (including vehicles turning left) and pedestrians.","Wait for the yellow light, oncoming traffic must stop and give way.","Turn quickly, oncoming traffic must give way.","Wait for 5 seconds then turn quickly."],c:0,exp:"When turning right at a green light without a dedicated arrow, you must give way to oncoming vehicles and pedestrians crossing the road you are entering."},
{id:"g8",q:"When approaching an intersection with a single flashing yellow traffic light. You must -",img:"g8",opts:["Slow down and sound the horn.","Stop and give way to all traffic.","Slow down; be prepared to stop and give way to vehicles on the right then drive on cautiously.","Accelerate through the intersection."],c:2,exp:"A flashing yellow light acts as a warning; drivers must slow down, apply standard give-way-to-the-right rules, and proceed with caution."},
{id:"g9",q:"Who must give way at a pedestrian crossing?",img:null,opts:["Only the driver of Car A, which is travelling on the same side of the road as the pedestrian.","Neither Car A or Car B must give way if the pedestrian is in the middle of the road.","Car A and Car B must stop and give way to any pedestrian on the crossing.","The pedestrian must give way to all traffic."],c:2,exp:"All approaching drivers must stop and give way to pedestrians who are on or entering a marked pedestrian crossing."},
{id:"g10",q:"What is the maximum speed a car learner licence holder can drive in a 110 km/h speed zone?",img:"g10",opts:["110 km/h.","90 km/h.","100 km/h.","80 km/h."],c:1,exp:"Under Tasmanian road rules, learner drivers are restricted to a maximum speed of 90 km/h, regardless of any higher posted speed limit."},
{id:"g11",q:"What is the maximum blood-alcohol content (B.A.C) for a learner driver?",img:null,opts:[".05%.","A.C) for a learner driver? A. .05%. B. .02%.",".08%.","Zero."],c:3,exp:"Learner drivers in Tasmania must have a zero blood alcohol concentration when driving."},
{id:"g12",q:"In what order should the cars go through the intersection?",img:"g12",opts:["Car C, then Car B, then, Car A.","Car B, then Car C, then Car A.","Car B, then Car A, then Car C.","Car A, then Car B, then, Car C."],c:1,exp:"Without the diagram, general priority dictates that vehicles going straight have right of way over vehicles turning across their path, and vehicles must give way to their right."},
{id:"g13",q:"In what order should the cars go through the roundabout? (Car A and car C are travelling straight ahead. Car B is turning right.)",img:"g13",opts:["Car B, then Car C, then Car A.","Car B, then Car A, then Car C.","Car A, then Car B, then, Car C.","Car C, then Car A, then Car B."],c:1,exp:"Without the diagram, vehicles entering a roundabout must give way to any vehicle already in the roundabout."},
{id:"g14",q:"Which car gives way?",img:"g14",opts:["Car A","Car B"],c:1,exp:"At a T-intersection, the vehicle on the terminating road must give way to traffic on the continuing road."},
{id:"g15",q:"Which car gives way?",img:"g15",opts:["Car A","Car B"],c:1,exp:"At an intersection with traffic lights, a driver turning right must give way to oncoming vehicles going straight."},
{id:"g16",q:"Which vehicle gives way?",img:"g16",opts:["Motorcyclist","Car B"],c:1,exp:"A driver using a slip lane must give way to any vehicle approaching from the right or turning right at the intersection."},
{id:"g17",q:"Which car must give way?",img:"g17",opts:["Car A","Car B"],c:1,exp:"At an uncontrolled intersection, give way to vehicles approaching from your right."},
{id:"g18",q:"Which car must give way?",img:"g18",opts:["Car A","Car B"],c:1,exp:"A driver using a slip lane must give way to vehicles turning right at the intersection, even if they face a stop sign."},
{id:"g19",q:"Which car goes first?",img:"g19",opts:["Car A","Car B"],c:0,exp:"Car A is on the continuing road with no signs. Car B faces a Give Way sign and must yield."},
{id:"g117",q:"Which car gives way?",img:"g117",opts:["Car A","Car B"],c:1,exp:"At a T-intersection, the vehicle on the terminating road must give way."},
{id:"g118",q:"The traffic lights are green and there is a red right arrow. Cars A and B are going straight ahead, Car C is turning right. Which car(s) go first?",img:"g118",opts:["Car A and Car C.","Car B and Car C.","Car C.","Car A and Car B."],c:3,exp:"Vehicles travelling straight on a green light have right of way; a red right arrow strictly prohibits turning vehicles from proceeding."},
{id:"g119",q:"There are red traffic lights and a green right arrow. Cars A and B are going straight ahead, Car C is turning right. Which car(s) go first?",img:"g119",opts:["Car A and Car C.","Car A and Car B.","Car A.","Car C."],c:3,exp:"The green right arrow allows the turning vehicle to proceed, while the red circular lights require vehicles travelling straight to remain stopped."},
{id:"g120",q:"Which vehicle gives way?",img:"g120",opts:["Car A","Truck B"],c:0,exp:"Car A has a give-way sign and is turning across the path of oncoming traffic. Car A must give way."},
{id:"g121",q:"Which car goes first?",img:"g121",opts:["Car A","Car B"],c:0,exp:"At a roundabout, give way to vehicles already in the roundabout."},
{id:"g122",q:"On a multi-laned road, Car A and Car B want to change to the centre lane. Which car can change lanes first?",img:"g122",opts:["Car A - as it is changing into the right hand lane","Car B - as Car C has to give way to a car on its right"],c:1,exp:"When two drivers are changing lanes into the same centre lane, the driver on the left must give way to the vehicle on their right."},
{id:"g123",q:"Which vehicle goes first?",img:"g123",opts:["Car D.","Cyclist C.","Car B.","Car A."],c:3,exp:"In standard give-way priority where no signs dictate otherwise, vehicles travelling straight have priority, and vehicles give way to their right."},
{id:"g124",q:"Which car goes first?",img:"g124",opts:["Car A","Car B"],c:0,exp:"At a T-intersection, the vehicle on the continuing road has right of way."},
{id:"g125",q:"You are driving Car B. You must give way to -",img:null,opts:["No one (you pull out first).","You must give way to - A. No one (you pull out first). B. The pedestrian.","The pedestrian and Car A.","Car A."],c:2,exp:"When entering a road from a driveway or adjacent property, you must yield to all vehicles and pedestrians on the road and footpaths."},
{id:"g126",q:"Who must give way?",img:"g126",opts:["Car A","The pedestrian"],c:0,exp:"A vehicle turning at an intersection must always give way to pedestrians crossing the road."},
{id:"g127",q:"In what order do the cars go?",img:"g127",opts:["Car C, Car A, Car B and Car D","Car C, Car B, Car A and Car D."],c:1,exp:"At intersections with multiple give-way interactions, straight-traveling vehicles hold priority, followed by those obeying the give-way-to-the-right rule."},
{id:"g128",q:"Which car goes first?",img:"g128",opts:["Car A","Car B"],c:0,exp:"Car A is on the continuing road. Car B faces a Give Way sign."},
{id:"g129",q:"Does the car or the pedestrian have to give way?",img:"g129",opts:["The Pedestrian","The Car"],c:1,exp:"A turning vehicle must give way to pedestrians crossing the road it is entering."},
{id:"g130",q:"Which car must give way?",img:"g130",opts:["Car A","Car B"],c:1,exp:"The vehicle on the terminating road or turning across traffic must give way."},
{id:"g131",q:"Which car must give way?",img:"g131",opts:["Car A","Car B"],c:1,exp:"The vehicle with the STOP sign must give way to all traffic."},
{id:"g132",q:"Which car must give way?",img:"g132",opts:["Car A","Car B"],c:1,exp:"The vehicle with the STOP sign must give way to all traffic on the continuing road."},
{id:"g133",q:"Which car must give way?",img:"g133",opts:["Car A","Car B"],c:1,exp:"The vehicle turning across the path of oncoming traffic must give way."},
{id:"g134",q:"Which vehicle goes first?",img:"g134",opts:["Car A","Truck B"],c:1,exp:"The larger vehicle on the continuing road has right of way."},
{id:"g135",q:"Which car goes first?",img:"g135",opts:["Car A","Car B"],c:0,exp:"At a roundabout or intersection, the vehicle with right of way based on signs and position goes first."},
{id:"g136",q:"Which car gives way?",img:"g136",opts:["Car A","Car B"],c:1,exp:"The vehicle turning across the path of another vehicle must give way."},
{id:"g137",q:"Which car gives way?",img:"g137",opts:["Car A","Car B"],c:1,exp:"At an uncontrolled intersection, give way to vehicles on your right."},
{id:"g138",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. No one, the other cars must give way to you.","Car D","Cars B, C and D","Car B"],c:2,exp:"When facing a STOP or GIVE WAY sign, you must yield to all cross traffic."},
{id:"g139",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Cars B, C and D","Cars C and B","Car B","Cars B and D"],c:0,exp:"Vehicles turning right from a terminating road must yield to all traffic on the continuing road."},
{id:"g140",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Cars C then B, make sure D is turning left","Cars B and D","Cars D, C and B","Cars D and C"],c:2,exp:"Facing a STOP sign requires you to yield to all vehicles traversing or turning on the intersecting road."},
{id:"g141",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Car B","No one, the other cars must give way to you"],c:1,exp:"When turning right at a T-intersection, you must give way to all vehicles on the continuing road from both directions."},
{id:"g142",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Car D","Car B","Cars B and D","Cars B and C"],c:2,exp:"As a vehicle on the terminating road, you must give way to cross traffic from the left and right."},
{id:"g143",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Cars B and C","Cars B and D"],c:1,exp:"Turning vehicles must yield to oncoming traffic travelling straight and cross traffic if dictated by signs."},
{id:"g144",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Cars B and C","D and C","Car C","Car D"],c:1,exp:"Approaching an intersection, you must yield to vehicles on your right and oncoming vehicles if turning right."},
{id:"g145",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Car C","No one, the other cars must give way to you","Car B","Car D"],c:2,exp:"Without signs or lines, you must give way to the vehicle approaching from your right."},
{id:"g146",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Cars B and C","Car B"],c:0,exp:"When facing a STOP or GIVE WAY sign, you must yield to all cross-traffic vehicles before proceeding."},
{id:"g147",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Car C","Car B and the pedestrian","The pedestrian and Cars B and C","Car B"],c:1,exp:"Drivers turning into a street must yield to pedestrians crossing that street and oncoming vehicles travelling straight."},
{id:"g148",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. Car C","Car B","No one, the other cars must give way to you.","Cars B and C"],c:2,exp:"If you are on the continuing road of a T-intersection travelling straight, you have priority over vehicles turning from the terminating road."},
{id:"g149",q:"You are driving Car A. Which cars must you give way to?",img:"g149",opts:["Which cars must you give way to? A. Cars B and C","Cars B, C and D","Cars D and C","Cars D and B"],c:1,exp:"Facing a control sign at a multi-way intersection means you yield to all traversing traffic before entering."},
{id:"g150",q:"You are driving Car A. You want to turn right. You must give way to -",img:"g150",opts:["You want to turn right. You must give way to - A. Cars B and C","Cars B and C and the pedestrian","Car C and the pedestrian","Car B and the pedestrian"],c:1,exp:"A right-turning vehicle must give way to oncoming traffic, cross traffic (if on a terminating road), and pedestrians crossing the destination road."},
{id:"g151",q:"You are driving Car A. You must give way to -",img:null,opts:["You must give way to - A. No one (you go first)","Car B","Cars B, C and D","Cars B and C"],c:2,exp:"At an intersection governed by a STOP or GIVE WAY sign, you must yield to all other vehicles in the intersection."}];
const TRAF=[{id:"g20",q:"Which of the following statements is true?",img:null,opts:["It is safe to drive after taking medications prescribed by a doctor.","Medicines bought over the counter do not affect your driving.","Some medications taken in combination with alcohol cause increased drowsiness.","It is safe to drive after taking medications if you take less than the suggested dosage."],c:2,exp:"Mixing certain medications with alcohol exponentially increases side effects like drowsiness, severely impairing driving ability."},
{id:"g21",q:"Which of the following statements is true?",img:null,opts:["Medication taken with alcohol does not increase the effect of the alcohol on your driving ability.","You should ask your doctor or pharmacist about how your medication may affect your driving ability.","There are no medications with side-effects which will affect your driving ability.","If a doctor prescribes your medication then it will enhance your driving ability."],c:1,exp:"Medical professionals provide vital information on drug side effects and their legal or physical impact on operating a vehicle safely."},
{id:"g22",q:"Which of the following statements is true?",img:null,opts:["You should start a long trip after a long period of work.","It is best to drive on a long trip during the night or early mornings.","Taking breaks from driving during a long trip will make you more tired.","You should take regular, 10 minute breaks on a long trip."],c:3,exp:"Fatigue management strategies mandate taking regular rest breaks to maintain concentration on long journeys."},
{id:"g23",q:"If you have not slept for 24 hours",img:null,opts:["You have the same crash risk as a driver with a blood alcohol content of twice the legal limit.","It has no real effect on your driving.","You should turn up the music to keep you alert.","Your driving ability will be increased."],c:0,exp:"Severe sleep deprivation heavily impairs cognitive function and reaction times, equating to a BAC of approximately 0.10%."},
{id:"g24",q:"Which of the following statements is true?",img:null,opts:["You should only adjust your radio/CD/DVD/Music Player while driving if you are good at multi-tasking.","You should limit distractions by spending a few minutes getting organized before starting your journey.","You should only check text messages at the traffic lights.","As long as you keep one hand on the steering wheel, it is OK to check your mobile phone."],c:1,exp:"Preparation eliminates in-cabin distractions, ensuring full attention is maintained on the road once driving commences."},
{id:"g25",q:"Before you drive a car, you should check that -",img:null,opts:["It is registered.","It is roadworthy.","It is registered and roadworthy.","Whether the previous driver had committed a traffic offence in it"],c:2,exp:"Driving an unregistered or unroadworthy vehicle is illegal and voids mandatory insurance coverage."},
{id:"g26",q:"You have a driver licence and you change your home (residential) address. You need to-",img:null,opts:["Do nothing until your driver licence expires.","Contact Service Tasmania within one month.","Do nothing.","Contact Service Tasmania within 14 days."],c:3,exp:"Tasmanian law dictates that you must notify Service Tasmania of any change of residential address within 14 days."},
{id:"g27",q:"Which of the following statements is true? A car learner driver may only drive:",img:null,opts:["With a current Australian full (not provisional or overseas) licensed driver who has not been suspended or disqualified in the previous 2 years.","During daylight hours.","With a provisional driver.","With a driver who is at least 25 years of age."],c:0,exp:"Supervisory drivers must hold a full Australian licence and have a satisfactory recent driving history without recent suspensions."},
{id:"g28",q:"Which of the following statements is true?",img:null,opts:["Ecstasy, marijuana (cannabis) and heroin have no effect on your ability to safely control your car.","The effect of drugs like speed or ecstasy makes you over confident, so you take risks while driving.","Small amounts of marijuana and alcohol enable you to respond quicker in emergency situations.","The use of recreational drugs has no impact on your driving ability."],c:1,exp:"Illicit stimulants increase aggression and overconfidence, severely degrading risk assessment and safe driving behaviour."},
{id:"g29",q:"If you are taking several medications and you want to drive you should -",img:null,opts:["Ask your passengers to let you know if you are not driving as well as you should.","Ask your doctor if the combination of drugs will make it dangerous to drive.","Drive carefully around your local streets to see if you are affected.","Drive as normal since all medications are safe and will not affect your driving ability."],c:1,exp:"Only a medical professional can accurately assess how drug interactions will impair your physical and cognitive driving abilities."},
{id:"g30",q:"Your driver licence has a condition that you must wear visual aids (such as glasses) when driving, you -",img:null,opts:["Must wear visual aids when driving.","Must wear visual aids when you have them with you.","Do not have to wear visual aids if your optometrist says that you do not need to them anymore.","Don’t have to wear visual aids."],c:0,exp:"Licence conditions are legally binding. If your vision is corrected, you must update your licence details with Service Tasmania before driving without aids."},
{id:"g31",q:"What does a car licence allow you to drive?",img:null,opts:["A motor vehicle (other than a motorcycle) with a GVM of 4.5 tonnes or less, seating no more than 12 adults (including the driver).","Any vehicle registered as a car or motorcycle.","Any motor vehicle combination.","Any motor vehicle (other than a motorcycle) with a GVM greater than 4.5 tonnes."],c:0,exp:"A standard Class C (Car) licence covers vehicles up to 4.5 tonnes Gross Vehicle Mass and a maximum of 12 seats."},
{id:"g32",q:"A car learner driver can NOT -",img:null,opts:["Drive during night time hours.","Drive in wet conditions.","Tow another vehicle including a trailer.","Drive on a highway."],c:2,exp:"Learner drivers in Tasmania are prohibited from towing any trailer or other vehicle."},
{id:"g33",q:"The blood alcohol content for a fully (non-provisional) licensed driver must be below -",img:null,opts:[".05%.",".08%.","Zero.",".10%."],c:0,exp:"The legal BAC limit for full licence holders driving a standard vehicle in Tasmania is strictly under 0.05%."},
{id:"g34",q:"A learner or provisional (P1 and P2) driver’s maximum blood alcohol content is -",img:null,opts:[".05%.",".08%.","Zero.",".10%."],c:2,exp:"L and P plate drivers must maintain a strict zero blood alcohol concentration at all times."},
{id:"g35",q:"You have a car learner licence, so you -",img:null,opts:["Must only display one ’L’ plate so that it can be clearly seen from the front of the vehicle.","Must only display one ’L’ plate so that it can be clearly seen from the rear of the vehicle.","Are not required to display L-plates when accompanied by a supervising driver.","Must display ’L’ plates so that they can be clearly seen from the front and the rear of the vehicle."],c:3,exp:"Learner drivers are legally required to display clearly visible L plates on both the front and rear of the vehicle."},
{id:"g36",q:"You have a car provisional licence for less than one year (P1 licence), so you -",img:null,opts:["Must display one ’P’ plate so that it can be clearly seen from the front of the vehicle.","Must display one ’P’ plate so that it can be clearly seen from the rear of the vehicle.","Must display ’P’ plates so that they can be clearly seen from the front and the rear of the vehicle.","Are not required to display P plates when accompanied by a passenger over 25 years old."],c:2,exp:"P1 drivers must display red P plates clearly on the front and rear of the vehicle."},
{id:"g37",q:"You set out on a fairly long drive to see some friends. After a while you start feeling tired. What should you do?",img:null,opts:["Turn the music up louder to keep you alert.","Take regular, 10 minute breaks throughout the long trip.","Stop at a shop and get a drink that contains caffeine to help you keep awake.","Make sure you get plenty of fresh air circulating inside the car by winding down the window."],c:1,exp:"The only effective cure for driver fatigue is taking adequate rest breaks."},
{id:"g38",q:"If you are involved in a crash and a vehicle is damaged but no one is injured you must-",img:null,opts:["Stop at the crash exchange names, addresses and registration numbers and any other information to identify the vehicle with the driver of the other vehicle as soon as possible, and within 24 hours.","Continue driving as no one had been injured.","Stop only during daylight hours.","Only stop to give your details if you caused the accident."],c:0,exp:"The law requires all parties involved in a crash to stop and exchange personal and vehicle details regardless of fault."},
{id:"g39",q:"If you are involved in a crash and someone is injured, you must -",img:null,opts:["Drive to the nearest Police station.","Look for a witness to the accident.","Drive on, you are not injured.","Stop your vehicle immediately and give assistance. If you need to get help, leave a responsible person at the accident scene."],c:3,exp:"Fleeing an accident scene where injuries occurred is a serious offence; immediate assistance and securing the scene are mandatory."},
{id:"g40",q:"When driving, you must carry your licence -",img:null,opts:["Only when towing a trailer.","During daylight hours only.","When you remember it.","At all times."],c:3,exp:"You are legally required to have your driver licence with you whenever you are driving a vehicle."},
{id:"g41",q:"What is the minimum continuous period that you must hold a novice car learner licence before progressing to a P1 licence?",img:null,opts:["3 continuous months.","6 continuous months.","9 continuous months.","12 continuous months."],c:3,exp:"In Tasmania, learner drivers must hold their licence for a minimum continuous period of 12 months before taking the P1 assessment."}];
const ROAD=[{id:"g42",q:"You are driving on a divided road and see an emergency vehicle on the other side of the road with lights flashing. There is no dividing barrier. What must you do?",img:"g42",opts:["Slow down to 10km/h below the speed limit.","Stop and offer assistance.","Slow down to 40km/h as you pass.","No need to slow down as it is on the other side for the road."],c:2,exp:"The law requires drivers to slow down to 40 km/h when passing a stationary or slow-moving emergency/response vehicle with flashing lights, even on the opposite side of an undivided road."},
{id:"g43",q:"When driving at night, you must dip your headlights -",img:"g43",opts:["Only when another vehicle is approaching you from the opposite direction and is within 50 metres.","Within 200 metres when approaching another vehicle from either the opposite direction or from behind.","Within 3 metres when approaching another vehicle from either the opposite direction or from behind.","You never need to dip your headlights."],c:1,exp:"High beams must be dipped within 200 metres to prevent blinding oncoming drivers or drivers you are following."},
{id:"g44",q:"At a railway crossing with red lights flashing, you must-",img:"g44",opts:["Slow down and cross with care.","Stop and wait until the red lights stop flashing and the train passes before driving on.","Speed up and quickly go through the crossing before the train passes.","\\[Blank/Missing in source\\]"],c:1,exp:"Flashing red lights at a level crossing indicate a train is approaching; you must stop and wait until the lights completely cease flashing."},
{id:"g45",q:"An emergency vehicle (e.g. ambulance or fire engine) is sounding its siren and quickly approaching your vehicle from behind. You must-",img:"g45",opts:["Immediately turn on your vehicles hazard lights.","Immediately sound your horn to warn other vehicles of the approaching emergency vehicle.","Immediately accelerate.","Give way by either pulling over to the side of the road or moving into another lane to enable the emergency vehicle to pass."],c:3,exp:"Drivers must safely clear the path for an active emergency vehicle by moving out of its way and stopping if necessary."},
{id:"g46",q:"You are driving Car A. You are approaching an uncontrolled intersection and want to turn left. There is a cyclist in front of you. You must-",img:"g46",opts:["You are approaching an uncontrolled intersection and want to turn left. There is a cyclist in front of you. You must- A. Sound your horn to warn the cyclist that you are behind and the cyclist must give way.","Allow the cyclist to go through the intersection safely then turn left at the intersection.","Accelerate and pass the cyclist then turn left in front of the cyclist.","Accelerate, indicate and sound your horn to warn the cyclist then turn left in front of the cyclist."],c:1,exp:"Cutting off a cyclist by turning left immediately in front of them is illegal and dangerous; you must wait until they clear the intersection."},
{id:"g47",q:"Who, apart from cyclists, can use a bicycle path?",img:null,opts:["Any vehicle.","If signs don’t say otherwise, a person in a wheelchair or pushing a wheelchair or a person using roller blades or roller-skates.","Motorcyclists.","Courier vans."],c:1,exp:"Shared mobility devices like wheelchairs and roller skates are generally permitted on bicycle paths unless specifically signposted otherwise."},
{id:"g48",q:"You hold a novice learner licence, when can you use a mobile phone while sitting in the driver’s seat?",img:null,opts:["At any time if using hands free.","At any time, when the phone call is less than 5 minutes long.","When you are stopped at traffic lights or stopped in traffic.","Only when your vehicle is parked."],c:3,exp:"Learner and P1 drivers face a total ban on mobile phone use; the vehicle must be legally parked to use a phone."},
{id:"g49",q:"You can do a U-turn at an intersection with traffic lights -",img:"g49",opts:["Between 9 p.m. and 6 a.m.","Only when there is \\\"U-turn permitted\\\" sign.","If there is no oncoming traffic.","If the traffic lights are green."],c:1,exp:"U-turns at signalised intersections are strictly prohibited unless explicitly allowed by a ’U-turn permitted’ sign."},
{id:"g50",q:"You are driving Car A. You are stopped at a children’s crossing displaying an orange flag. You can drive on when",img:null,opts:["You are stopped at a children’s crossing displaying an orange flag. You can drive on when A. The pedestrians have left the crossing.","The pedestrians are not in your car’s path.","The pedestrians are about to step onto the crossing.","\\[Blank/Missing in source\\]"],c:0,exp:"At a flagged children’s crossing, you must remain stopped until all pedestrians have completely cleared the crossing."},
{id:"g51",q:"You are driving Car A. Car B In front of you has stopped at a pedestrian crossing, you must -",img:"g51",opts:["Car B In front of you has stopped at a pedestrian crossing, you must - A. Overtake Car B.","Overtake with care if satisfied there is no pedestrian on the crossing.","Stop behind Car B.","Indicate and sound your horn to warn Car B and any pedestrians that you are overtaking."],c:2,exp:"It is illegal to overtake a vehicle that has stopped at a pedestrian crossing to yield to pedestrians."},
{id:"g52",q:"As a P1 licence holder, what is the maximum speed you can drive on a road with this sign? (110 sign)",img:"g52",opts:["80 km/h.","90 km/h.","100 km/h.","110 km/h."],c:1,exp:"P1 provisional drivers in Tasmania are restricted to a maximum speed limit of 90 km/h."},
{id:"g53",q:"This sign means? (60 sign)",img:"g53",opts:["You must travel more than 60 km/h","You must not travel more than 60 km/h.","You are on Highway number 60.","Children’s crossing, slow down."],c:1,exp:"A speed restriction sign denotes the absolute maximum legal speed limit for that section of road."},
{id:"g54",q:"What is the maximum speed limit (unless signposted otherwise) for vehicles in a built-up area (like a town or a city)?",img:null,opts:["70 km/h.","80 km/h.","60 km/h.","50 km/h."],c:3,exp:"The default urban speed limit in built-up residential and commercial areas across Tasmania is 50 km/h."},
{id:"g55",q:"What is the maximum speed limit for vehicles turning at an intersection controlled by traffic lights?",img:null,opts:["20 km/h","10 km/h.","15 km/h","50 km/h"],c:3,exp:"The legal limit remains the posted speed (e.g., 50 km/h), but drivers must slow to a safe speed appropriate for the turning manoeuvre."},
{id:"g56",q:"When approaching a stopped school bus with amber flashing lights that is letting off children (on a country road), you must -",img:"g56",opts:["Slow down to 10 km/h within 10 metres of the bus and watch for pedestrians.","Drive within the posted speed limit and watch for pedestrians.","Slow down to 5 km/h within 10 metres of the bus and watch for pedestrians.","Slow down to 40 km/h 50 metres before you overtake the bus and watch for pedestrians."],c:3,exp:"Tasmanian road rules require slowing to 40 km/h when within 50 metres of a bus displaying flashing warning lights."},
{id:"g57",q:"This sign means? (Road Work 60 sign)",img:"g57",opts:["You must not travel more than 60 km/h","You can travel at the speed that normally applies to the road, as it is a warning sign suggesting that you slow down.","You can travel at any speed as it only applies to road construction vehicles.","You can travel at any speed if you are driving to or from your work."],c:0,exp:"Road work speed limit signs are regulatory and enforceable, setting the maximum legal speed through the work zone."},
{id:"g58",q:"You are driving in a built-up area (like a city or town). A bus is stopped at a bus stop in the left lane next to you and has this sign displayed. There are parked vehicles in front of the bus and it has signalled right. What must you do?",img:"g58",opts:["Allow the bus to move off from the kerb into your lane.","Continue ahead at the speed limit, providing it is safe.","Slow to 60 km/h and give way to pedestrians only.","Slow to 50 km/h and only stop to give way to pedestrians."],c:0,exp:"Drivers must give way to buses displaying a ’Give Way to Buses’ sign that are signalling to pull out from the kerb in a built-up area."},
{id:"g59",q:"What is the maximum speed limit in a school zone during school days?",img:"g59",opts:["45 km/h.","60 km/h.","40 km/h.","50 km/h."],c:2,exp:"The enforced speed limit in marked school zones during operational hours is strictly 40 km/h."},
{id:"g60",q:"Which ONE of the following statements is true?",img:null,opts:["The speed limit in School Zones does not apply if there are no children around.","The speed limit in School Zones only applies to children from within that school zone","The speed limit applies on weekdays only.","The speed limit in school zones applies on official school days and during designated times."],c:3,exp:"School zone speed limits are active during the times displayed on the sign on gazetted school days, regardless of visible pedestrian activity."},
{id:"g61",q:"You are behind a long vehicle (7.5 m or more in length) that is signalling and starting to turn left. The truck is displaying a ’Do not overtake turning vehicle’ sign and is in the second lane from the left side of the road. You also want to turn left. What must you do?",img:"g61",opts:["Use the far left lane to pass the truck and turn left.","Sound your horn and quickly pass the truck on the left before the truck turns.","Allow the truck to complete its turn before you turn left.","Indicate and quickly pass the truck on the right hand side before the truck turns."],c:2,exp:"Long vehicles require extra space; overtaking them on the inside while they turn is illegal and highly dangerous."},
{id:"g62",q:"You are driving a vehicle along a multi-lane road and the speed limit is 80km/h or less, which lane should you travel in?",img:null,opts:["In the left-hand lane unless overtaking another vehicle in the left lane.","In the left-hand lane unless you are turning right.","In either lane.","You must travel in the left-hand lane."],c:2,exp:"On roads 80 km/h or less, drivers may travel in any lane unless directed by a ’Keep Left Unless Overtaking’ sign."},
{id:"g63",q:"You are driving Car A along a multi-lane road and the speed limit is more than 80 km/h which of the following statements is WRONG?",img:"g63",opts:["You must drive in the left hand lane unless you are turning right.","You must travel in the left hand lane unless you are overtaking a vehicle in the left hand lane.","You must travel in the left hand lane unless avoiding an obstruction.","You can travel in either lane."],c:3,exp:"On roads over 80 km/h, the rule is to keep left; travelling indiscriminately in either lane is illegal."},
{id:"g64",q:"Where there are no line markings on the road where should you drive?",img:"g64",opts:["In the centre of the road.","On any part of the road.","Within two metres of the left-hand side of the road.","As close as practical to the left side of the road."],c:3,exp:"Drivers must maintain a position as near as practicable to the far left side of a road without lane markings."},
{id:"g65",q:"Which of the following statements is correct? On a multi-laned road (with two or more lanes travelling in the same direction) drivers may:",img:null,opts:["Make a U-turn across lanes travelling in the same direction.","Change lanes without indicating.","Change lanes when it is safe to do so.","Change lanes at any time, as other drivers must show courtesy and give way to you."],c:2,exp:"Lane changes are permitted only when a driver can safely execute the manoeuvre without interfering with existing traffic."},
{id:"g66",q:"You are driving car A. In what direction must you travel?",img:"g66",opts:["In what direction must you travel? A. Turn right only.","Turn left only.","Straight ahead or make a right turn.","Straight ahead only."],c:2,exp:"You must follow the directions indicated by the lane arrows painted on the road surface."},
{id:"g67",q:"You are driving Car A. In what direction must you travel?",img:"g67",opts:["In what direction must you travel? A. Turn left or go straight ahead.","Turn left only when there is traffic in the other lane.","Go straight ahead.","Turn left."],c:0,exp:"Lane arrows dictate permitted manoeuvres; multiple arrows indicate multiple legal paths."},
{id:"g68",q:"You are driving Car A and you want to merge with another line of traffic travelling in the same direction (there are no marked lanes)",img:"g68",opts:["You must give way to Car B as it is on your right","You have right of way, as you are travelling ahead of Cars B and","C. You have to give way to Cars B and C as they are to your right.","You have to give way to cars B and C as you are travelling ahead of them."],c:1,exp:"When lines of traffic merge without lane lines ending, the vehicle trailing must yield to the vehicle ahead."},
{id:"g69",q:"You are driving Car A in a 60 km/h speed zone. Your lane ends and you must merge with another lane of traffic travelling in the same direction (there are line markings) -",img:"g69",opts:["Cars B and C have to give way to you as they are in the right lane","You have to give way to Cars B and C as you are moving into their lane.","Cars B and C have to give way to you as you are travelling ahead of them.","You have to give way to Car B as it is travelling ahead of you."],c:1,exp:"If your marked lane ends and you cross a broken line to merge, you must give way to traffic already in the continuing lane."},
{id:"g70",q:"You are driving Car A in a 100 km/hr speed zone. Your lane has come to an end and you want to merge into another lane of traffic. There are road markings.",img:"g70",opts:["You must give way to Car B as you are moving into the lane it is travelling in.","Car B has to give way to you as you are travelling ahead of it.","Car B has to give way to you as it is in the right lane.","\\[Blank/Missing in source\\]"],c:0,exp:"Crossing lane lines to merge means you are entering another lane and must yield to existing traffic."},
{id:"g71",q:"You are driving towards a large roundabout that has multi-lanes. At the roundabout, you intend to turn off more than halfway around the roundabout. What signals must you give?",img:null,opts:["On approach to the roundabout, give a right signal and, just before you the exit road, give a left signal.","Only give a right signal on the approach to the roundabout, as no other signal is required.","Providing it is safe, a signal is not required at all.","On approach to the roundabout, give a left signal then a right signal when turning off."],c:0,exp:"Approaching a right turn requires a right indicator; you must then signal left just before exiting the roundabout if practicable."},
{id:"g72",q:"You are driving a motor vehicle towards a marked multi-laned roundabout. You want to travel straight on through the roundabout to the road opposite. What lane must you take?",img:"g72",opts:["You must enter and leave the roundabout in the left lane.","You may enter and leave the roundabout in either lane.","You must enter and leave the roundabout in the right lane.","Move to the left lane before the roundabout then leave by the right lane."],c:1,exp:"Travelling straight through allows use of either lane unless specific arrows direct otherwise."},
{id:"g73",q:"You are driving Car A. You want to move from the side of the road into a line of traffic, you must indicate -",img:null,opts:["You want to move from the side of the road into a line of traffic, you must indicate - A. For one second and give way to all traffic","For 3 seconds and give way to all traffic","For 5 seconds and give way to all traffic","Only if there is traffic coming"],c:2,exp:"You must signal for at least 5 seconds before moving off from a stationary position at the side of the road."},
{id:"g74",q:"You are driving Car A. You want to move to the right hand lane. You must-",img:"g74",opts:["You want to move to the right hand lane. You must- A. Indicate to the right and give way to traffic in the right hand lane.","Give way to traffic in the right hand lane without indicating.","Indicate to the left.","Indicate to the right without giving way."],c:0,exp:"Changing lanes requires signalling intent and yielding to vehicles already occupying the target lane."},
{id:"g75",q:"Does a Police Officer’s directions overrule Stop and Give Way signs?",img:"g75",opts:["No.","Yes.","Yes, only at Give Way Signs.","Yes, only at Stop Signs."],c:1,exp:"The directions of a police officer or authorised traffic controller supersede all traffic signs and signals."},
{id:"g76",q:"At an intersection with a Police Officer who has one hand raised and one hand to his side as shown, do you -",img:null,opts:["Turn right.","Stop at the intersection.","Slow down and continue through the intersection.","Obey the traffic lights."],c:1,exp:"A raised hand from a police officer signifies a mandatory stop."},
{id:"g77",q:"At what age do you have to wear a seatbelt or suitable child restraint?",img:null,opts:["All ages.","Age 1 year and over.","Age 8 years and over.","Under the age of 65."],c:0,exp:"All occupants of a moving vehicle must be secured in a seatbelt or an appropriate child restraint regardless of age."},
{id:"g78",q:"Who will be fined if a passenger under the age of 16 is not wearing a seat belt or suitable child restraint?",img:null,opts:["The driver of the vehicle.","The passenger.","The owner of the vehicle.","Everyone in the vehicle."],c:0,exp:"The driver holds legal responsibility for ensuring all passengers under 16 are properly restrained."},
{id:"g79",q:"When is the driver of a motor vehicle (not a novice learner or P1 licence holder) allowed to use a mobile phone?",img:null,opts:["When they are certain they will not lose concentration for more than 5 seconds.","When the traffic is stationary or moving at less than 20kms per hour.","When the vehicle is parked with the engine off, or when the mobile phone is in a commercially designed holder and is fixed to the vehicle, or when it can be operated without being touched.","Any time as long as one hand remains on the steering wheel at all times"],c:2,exp:"Full licence holders can only use phones for calls/audio if securely mounted or operated hands-free without touching the device."},
{id:"g80",q:"Seatbelts -",img:null,opts:["Must be worn by drivers and passengers when travelling forward or stationary in traffic.","Only need to be worn when travelling over 50km/h.","Do not need to be worn by passengers.","Do not need to be worn by passengers under the age of 12 years."],c:0,exp:"Seatbelts are legally mandatory whenever the vehicle is moving forward or stopped in traffic (e.g., at a red light)."},
{id:"g81",q:"As a driver, you must wear a seatbelt -",img:null,opts:["When travelling over 60 km/h.","When convenient.","At all times.","When the vehicle is moving or stationary in traffic, unless reversing."],c:3,exp:"Drivers must remain buckled unless actively performing a reversing manoeuvre."},
{id:"g82",q:"What is the maximum speed a leaner driver can drive in a 100 km/h speed zone?",img:"g82",opts:["110 km/h","90 km/h","100 km/h","80 km/h"],c:1,exp:"Learner drivers have an absolute maximum speed limit of 90 km/h."},
{id:"g83",q:"As a P1 licence holder, what is the maximum speed you can drive on a road with this sign? (100 km/h sign)",img:"g83",opts:["110 km/h","90 km/h","100 km/h","80 km/h"],c:1,exp:"P1 drivers are legally capped at 90 km/h irrespective of higher road speed limits."},
{id:"g84",q:"What is the minimum recommended distance to leave between your vehicle and a cyclist when passing in a 50 km/h zone?",img:null,opts:["1 metre","2 metres","No distance","\\[Blank\\]"],c:0,exp:"In Tasmania, drivers must leave at least 1 metre when passing a cyclist in zones up to 60 km/h, and 1.5 metres in higher speed zones."},
{id:"g85",q:"This sign means? (45 km/h warning sign)",img:"g85",opts:["45 km/h is the advised maximum speed to travel around the curve ahead under good driving conditions.","Winding road for next 45 kilometres.","45 km/h is the legal maximum speed limit for the curve ahead.","You can only turn right for the next 45 km."],c:0,exp:"Yellow warning signs indicate the recommended safe speed for the upcoming hazard under ideal conditions."},
{id:"g86",q:"This sign means?",img:"g86",opts:["Road incomplete.","Divided road ahead.","Incomplete roundabout ahead.","Modified ’T’ intersection ahead."],c:1,exp:"A Y-shaped symbol on a warning sign indicates that a divided road begins ahead."},
{id:"g87",q:"This sign means?",img:"g87",opts:["Steep hill ahead.","Unmade road ahead.","Slippery road ahead.","Winding road ahead"],c:3,exp:"The symbol of a car with skidding tracks indicates that the road surface ahead may be slippery when wet."},
{id:"g88",q:"This sign means?",img:"g88",opts:["Hairpin bend to the right.","’U’ turns allowed.","You must turn right.","Road ends - turn around"],c:0,exp:"A sharp, U-shaped arrow pointing right warns drivers of an impending hairpin bend to the right."},
{id:"g89",q:"This sign means?",img:"g89",opts:["Helicopter landing pad ahead.","Ambulance Station ahead.","Hospital emergency entrance ahead.","A crossroad intersection ahead."],c:3,exp:"A black cross symbol on a diamond warning sign alerts drivers to a crossroad intersection ahead."},
{id:"g90",q:"This sign means?",img:"g90",opts:["Left lane closed, right lane open.","Left lane open, right lane closed.","Trucks must use right lane.","\\\"T\\\" intersection ahead."],c:1,exp:"This sign visually depicts the right lane ending, requiring traffic to merge safely into the continuing left lane."},
{id:"g91",q:"This sign means?",img:"g91",opts:["Bends ahead.","Road slopes ahead.","Slippery surface ahead.","Steep winding road ahead."],c:2,exp:"A winding or serpentine arrow warns drivers of a series of curves or bends in the road ahead."},
{id:"g92",q:"This sign means?",img:"g92",opts:["Do not pass another vehicle.","Stop and give way to all traffic and pedestrians.","Do not drive beyond this sign.","Allowed to enter."],c:2,exp:"A ’No Entry’ sign legally prohibits all vehicles from travelling past the sign into that road or area."},
{id:"g93",q:"This sign means?",img:"g93",opts:["No right turn.","One way traffic.","Left turn only sign.","Keep to the left of the sign."],c:3,exp:"A ’Keep Left’ sign directs drivers to pass to the left side of a traffic island, median strip, or road obstacle."},
{id:"g94",q:"This sign means?",img:"g94",opts:["Vehicles travel in both directions on this road.","No right or left turns.","No 3 point turns allowed.","No U-turns allowed."],c:0,exp:"Opposing arrows on a warning sign alert drivers that they are on or entering a road with two-way oncoming traffic."},
{id:"g95",q:"This sign means?",img:"g95",opts:["Danger, road bends sharply right.","Speed zone ends","You must not turn right.","No sharp right hand bends ahead."],c:2,exp:"Chevron alignment markers pointing right guide drivers through a sharp right-hand curve or hazard."},
{id:"g96",q:"This sign means?",img:"g96",opts:["Danger, road bends sharply left.","Speed zone ends.","No sharp left hand bends ahead.","You must not turn left."],c:3,exp:"Chevron alignment markers pointing left guide drivers safely through a sharp left-hand curve."},
{id:"g97",q:"This sign means?",img:"g97",opts:["Danger road ends.","You must not turn right.","No U-Turn Allowed.","Speed zone ends."],c:2,exp:"A U-turn arrow enclosed in a red circle with a diagonal slash means making a U-turn is strictly prohibited."},
{id:"g98",q:"This sign means?",img:"g98",opts:["Traffic must travel along the road only in the direction of the arrow.","Left turn at any time with care.","Right turn at any time with care.","Traffic can travel along the road in either direction."],c:0,exp:"A ’One Way’ sign legally mandates that all vehicles must travel only in the direction the arrow indicates."},
{id:"g99",q:"There are two types of road signs warning and regulatory. What is the difference between them?",img:null,opts:["No difference, they don’t need to be obeyed.","Regulatory signs alert drivers to road conditions and should be obeyed. Warning signs should be ignored.","Warning signs alert drivers to road conditions and should be obeyed. Regulatory signs must be obeyed.","No difference, they are both the same."],c:2,exp:"Warning signs advise of potential hazards, while regulatory signs instruct drivers on traffic laws that must legally be followed."},
{id:"g100",q:"This sign means?",img:"g100",opts:["Do not stop in the area covered by the sign for any reason.","You can park for a short time.","Stop to pick up or drop off passengers or goods.","Do not stand during the hours 8.30 a.m. to 4.30 p.m."],c:0,exp:"A ’No Stopping’ sign means you must not stop your vehicle for any reason (unless in a traffic jam or emergency) in the indicated area."},
{id:"g101",q:"This sign means?",img:"g101",opts:["U-turns -allowed.","3 point turn allowed","Turning area for heavy vehicles - give way.","You are at a roundabout."],c:2,exp:"A ’U-turn Permitted’ sign legally overrides default rules to allow U-turns at that specific intersection or location."},
{id:"g102",q:"This sign means on a multi-laned road?",img:"g102",opts:["Keep left at all times.","Drivers must only overtake using the left lane.","Drivers must not use the right lane unless they are overtaking, turning right or the traffic is congested.","Drivers must not use the right lane at any time."],c:2,exp:"The ’Keep Left Unless Overtaking’ sign legally requires drivers to stay out of the right lane unless passing, turning right, or in congested traffic."},
{id:"g103",q:"This sign means?",img:"g103",opts:["Parking permitted only for people in wheelchairs.","Parking permitted for people with disabilities that have a current disability parking permit.","Anyone may stop but only for a maximum of 2 minutes to pick up or drop off passengers or goods.","Parking permitted for people with prams."],c:1,exp:"Disabled parking bays are strictly reserved for vehicles displaying a valid disability parking permit."},
{id:"g104",q:"This sign means?",img:"g104",opts:["Parking permitted during non-peak hours.","Parking for buses only.","No parking for any reason.","No parking unless you are stopping for a maximum of 2 minutes to pick up or drop off passengers or goods."],c:3,exp:"A ’No Parking’ sign allows you to stop for a maximum of 2 minutes to drop off or pick up passengers or goods, provided the driver remains within 3 metres of the vehicle."},
{id:"g105",q:"This sign means?",img:"g105",opts:["Drivers cannot stop for more than five minutes to pick up or drop off passengers.","Drivers cannot stop during the times and days stated.","Drivers must not stop at any time.","Drivers can only stop during the times and days stated."],c:1,exp:"A Clearway sign strictly prohibits stopping for any reason during the specified times and days to ensure traffic flow."},
{id:"g106",q:"How close to a junction or an intersection without traffic lights can you legally park?",img:null,opts:["10 metres.","9 metres.","3 metres.","15 metres."],c:0,exp:"You must not park within 10 metres of an intersecting road at an intersection without traffic lights to maintain visibility and turning space."},
{id:"g107",q:"Can you park on a road over your own private driveway?",img:null,opts:["Yes, but only for 10 minutes.","Yes."],c:1,exp:"It is illegal to park across a driveway, including your own, though stopping briefly to drop off or pick up passengers is permitted."},
{id:"g108",q:"How must you park in a two-way street that has no signposted parking restrictions?",img:null,opts:["You must park parallel and as close as practical to the right-hand kerb.","You must park parallel and as close as practical to the left-hand kerb but not within 10 metres of a junction or intersection or on a yellow single line.","You must park parallel and as close as practical to the left-hand kerb, and within 10 metres of an intersection.","As close to the centre of the road as practical."],c:1,exp:"Default parking rules require parking parallel to the far left side of the road, avoiding intersections and continuous yellow edge lines."},
{id:"g109",q:"How close to a pedestrian crossing can you legally park?",img:"g109",opts:["20 metres before and 10 metres after the crossing.","3 metres before and 5 metres after the crossing.","5 metres on either side.","15 metres on either side."],c:0,exp:"To ensure pedestrians remain visible to approaching traffic, you must not park within 20 metres on the approach side or 10 metres on the departure side of a pedestrian crossing."},
{id:"g110",q:"If you are turning at an intersection must you give way to pedestrians?",img:null,opts:["Only if the pedestrians are under the age of 16 years.","Yes.","No.","Only if the pedestrians are over the age of 16 years."],c:1,exp:"When turning at an intersection, drivers are legally required to give way to any pedestrians crossing the road they are turning into."},
{id:"g111",q:"A yellow line along the side of the road means",img:null,opts:["Parking for taxis only.","Stopping not allowed during peak traffic hours.","Fire hydrant indicator.","No stopping or parking."],c:3,exp:"A continuous yellow edge line is a regulatory marking indicating that stopping or parking is strictly prohibited at all times."},
{id:"g112",q:"What does this sign mean?",img:"g112",opts:["Cyclists cannot use the road","You should give bicycle riders at least 1.5 metres when you pass."],c:1,exp:"This safety sign reminds drivers of the legal requirement to leave at least a 1.5-metre gap when passing cyclists in higher-speed zones."},
{id:"g113",q:"What must you do at an intersection with green traffic lights, which is blocked by other vehicles?",img:"g113",opts:["Enter the intersection.","Enter the intersection if you think the traffic will clear before the traffic lights change to red.","Do not enter the intersection until the traffic has cleared and you can safely drive through to the other side, and the traffic lights are green.","Do not enter the intersection unless the lights change to red."],c:2,exp:"It is illegal to enter an intersection if the road beyond it is blocked; you must wait until there is space to clear the intersection completely."},
{id:"g114",q:"You are driving Car A. The vehicles in front of you have stopped. When can you drive through the intersection?",img:null,opts:["The vehicles in front of you have stopped. When can you drive through the intersection? A. At any time when there is a green light if you think that you won’t block it.","At any time when the light is green even if you may block the intersection.","At any time when the light is green and the intersection is clear of traffic.","When the lights are red."],c:2,exp:"You may only enter an intersection on a green light if the path through and past the intersection is completely clear."},
{id:"g115",q:"When traffic lights turn from green to yellow you should -",img:"g115",opts:["Speed up and go through the lights before they turn red.","Stop, even if you must stop on the intersection and then reverse back to the stop line.","Stop, even if you are in the intersection.","Stop, if you can do so safely before the stop line."],c:3,exp:"A yellow light means stop; you must stop before the stop line unless it is unsafe to do so."},
{id:"g116",q:"You are approaching an intersection controlled by traffic lights. There is a red circular light and a green arrow pointing to the right. Can you turn right?",img:"g116",opts:["No, not at any time.","Yes.","No, only when both lights are green.","No, but you can go straight ahead."],c:1,exp:"A green directional arrow permits you to proceed in the direction of the arrow, regardless of the main circular red light."}];
const SAFE=[{id:"g152",q:"Can you legally drive over the speed limit?",img:null,opts:["Yes, at any time as long as the driver does not go over the speed limit by 10 km/h.","Yes, when the driver is overtaking a slower moving vehicle.","No.","Yes, when the driver has a good excuse."],c:2,exp:"Speed limits are absolute maximums under the law; exceeding them for any reason, including overtaking, is illegal."},
{id:"g153",q:"When following another vehicle in a lane of traffic, what distance is a useful guide to estimate the minimum safe following distance for dry road conditions?",img:null,opts:["Leave a 2-second time gap between you and the other vehicle.","Leave a 3-second time gap between you and the other vehicle.","Leave a 5-second time gap between you and the other vehicle.","Leave a 7-second time gap between you and the other vehicle."],c:0,exp:"Tasmanian road safety guidelines dictate leaving a minimum of a 2-second crash avoidance space in dry conditions."},
{id:"g154",q:"Which one of the following statements is true?",img:null,opts:["Provided you do not exceed the speed the limit you are always driving safely.","In certain situations and conditions driving at the speed limit may be dangerous.","Speed limits can be exceeded by up to 10km/h if the road and weather conditions are good.","Speed limits can be exceeded if you have a lawful excuse."],c:1,exp:"Speed limits are for ideal conditions; poor weather, heavy traffic, or road hazards require drivers to reduce their speed below the limit to remain safe."},
{id:"g155",q:"If you feel drowsy when driving what should you do?",img:null,opts:["Open the window and turn the radio on.","Drink lots of coffee whilst driving.","Turn the radio up loud.","Stop driving and have a break."],c:3,exp:"Temporary measures like caffeine or cold air do not cure fatigue; the only safe and legal response is to pull over and rest."},
{id:"g156",q:"If you are taking prescription drugs and you want to drive, you-",img:null,opts:["Should check the labelling to see if it is a nondrowsy-medication and only drive if it is a nondrowsy-formula.","Can drive because it is not a recreational drug.","Can drive during daylight hours but not at night.","Can drive but you should drink coffee to keep you alert."],c:0,exp:"Many prescription drugs impair motor skills and reaction times. You must verify the medication’s warning labels regarding driving or operating heavy machinery."},
{id:"g157",q:"What should you do when you see animals on the road at night?",img:null,opts:["Slow down and be prepared to avoid the animal.","Sound you horn.","Swerve violently.","Speed up to pass them quickly."],c:0,exp:"Swerving can cause catastrophic loss of control. The correct procedure is to brake safely in a straight line and prepare to stop."},
{id:"g158",q:"Which of the following statements is true?",img:null,opts:["Drinking alcohol increases your concentration when driving.","Driving with a blood alcohol content over .05 is legal.","You can only drink and drive while you have your learner licence.","The risk of causing a crash increases as your blood alcohol content rises."],c:3,exp:"Alcohol is a depressant that exponentially degrades reaction time, judgment, and vision, sharply increasing crash probability."},
{id:"g159",q:"If a seatbelt has been used in a severe crash -",img:null,opts:["It must be replaced.","It needs to be tested by a mechanic.","It will be fine to continue to use the seatbelt.","As long as it does not look damaged you can still use it."],c:0,exp:"The webbing and tensioner mechanisms in seatbelts are designed to stretch and absorb force once; they must be replaced after a severe impact to ensure future safety."},
{id:"g160",q:"Which of the following statements is correct?",img:null,opts:["If you have been drinking alcohol, it is better not to drive.","Taking prescribed drugs may reduce the effects of alcohol on the body.","Drinking coffee helps reduce the effects of alcohol on your body.","Having a shower may reduce the effects of alcohol on your body."],c:0,exp:"Only time processes alcohol out of the bloodstream. The only guaranteed safe approach is to separate drinking from driving entirely."},
{id:"g161",q:"Can medication used for hay fever or travel sickness affect your driving?",img:null,opts:["No, unless it has been prescribed by a doctor.","No","Yes.","Yes, but only if you’ve had no sleep the night before"],c:2,exp:"Many over-the-counter antihistamines and motion sickness medications cause significant drowsiness, heavily impairing driving ability."},
{id:"g162",q:"What should you do when driving in wet conditions?",img:null,opts:["Drive with the handbrake on.","Drive closer to vehicles to avoid back splash from the other vehicle.","Slow down as you need to allow much longer for stopping to avoid other vehicles and pedestrians.","As long as you are driving at the speed limit, you are driving safely."],c:2,exp:"Wet roads severely reduce tyre traction, doubling required stopping distances; speed must be reduced accordingly."},
{id:"g163",q:"Speeding is dangerous because -",img:null,opts:["The faster you drive the more time and space you need to stop.","Increasing speed also increases the severity of crashes.","Driving too fast around a corner can affect the car’s stability.","All of the above."],c:3,exp:"Speed exponentially increases braking distance, cornering instability, and the kinetic energy transferred during an impact."},
{id:"g164",q:"If an oncoming car’s headlights dazzle you, what should you do?",img:null,opts:["Keep driving and looking at oncoming lights, your eyes will adjust.","Put your high beam on.","Keep your eyes on the left-hand side of the road, slow down or stop.","Turn your lights off."],c:2,exp:"To avoid temporary blindness from high beams, look towards the left edge line to maintain lane position and reduce speed until visibility is restored."},
{id:"g165",q:"Which of the following statements is true?",img:null,opts:["Driving with a talkative passenger will overcome your fatigue.","You will feel more tired if you make stops on long trips.","You are more likely to become fatigued on short curving roads.","You should not drive if you are tired."],c:3,exp:"Driver fatigue is a leading cause of fatal crashes. If you are tired, your reaction times simulate intoxication; you must not drive."},
{id:"g166",q:"If one of your tyres has a blowout what should you do?",img:null,opts:["Accelerate to regain control.","Quickly apply the hand brake.","Brake gently and bring the car to a stop.","Sound your horn."],c:2,exp:"Sudden braking or steering during a blowout causes a complete loss of control. Maintain a firm grip on the steering wheel, ease off the accelerator, and brake gently to a stop."},
{id:"g167",q:"Which of the following statements is true?",img:null,opts:["If there are not enough seat belts then it is OK to share one.","Passengers in rear seats of a vehicle are not required to wear seat belts.","It is OK to hold the seat belt around you if you cannot find the clasp under the seat to secure it properly.","Passengers in vehicles are less likely to be injured in a crash if they are wearing seat belts."],c:3,exp:"Seatbelts prevent occupants from being ejected or striking the interior of the vehicle, drastically reducing the severity of crash injuries."},
{id:"g168",q:"Which of the following statements is true?",img:null,opts:["Ornaments hanging from the rear view mirror will stop you becoming fatigued when you are driving.","A novice learner driver can tow a trailer.","You should take extra care looking for cyclists or pedestrians at night..","You should rev your engine when approaching a cyclist to alert them of your approach."],c:2,exp:"Pedestrians and cyclists lack the illumination of motor vehicles, requiring drivers to exercise heightened vigilance during low-light conditions."},
{id:"g169",q:"Which statement is true?",img:null,opts:["Speeding never causes crashes.","Factors like road and weather conditions can affect a car’s stopping distance.","It is legal to travel 10 km/h over the speed limit.","When it’s raining, you need to reduce your following distance."],c:1,exp:"Stopping distance is heavily variable and directly impacted by tyre grip, which is compromised by wet roads, loose gravel, or poor weather conditions."},
{id:"g170",q:"Which one of the following statements for a car learner driver is correct?",img:null,opts:["You must have only one passenger in the car.","You must drive only during daylight hours."],c:1,exp:"The primary goal of the learner logbook period is to expose novice drivers to a wide spectrum of driving environments under full supervision to build competency."}];
const MOTO=[{id:"m1",q:"What is the legal maximum speed for a learner motorcycle rider on the open road?",img:null,opts:["80 km/h","90 km/h","100 km/h"],c:0,exp:"Learner and P1 provisional motorcycle riders must not exceed 80 km/h, even if the posted limit is higher."},
{id:"m2",q:"How many pillion passengers can a fully licensed motorcycle rider carry?",img:null,opts:["None","One","Two"],c:1,exp:"A fully licensed rider may carry one pillion passenger on a motorcycle designed for it."},
{id:"m3",q:"What is the legal maximum speed limit (unless signposted otherwise) for a motorcyclist in a built-up area?",img:null,opts:["80 km/h","40 km/h","50 km/h"],c:2,exp:"The default speed limit in built-up areas is 50 km/h for all vehicles including motorcycles."},
{id:"m4",q:"What is the legal maximum speed limit (unless signposted otherwise) for a fully (non-provisionally) licensed motorcyclist on the open road?",img:null,opts:["80 km/h","90 km/h","100 km/h"],c:2,exp:"The default speed limit on sealed roads outside built-up areas is 100 km/h for fully licensed riders."},
{id:"m5",q:"A learner motorcycle rider is allowed to ride:",img:null,opts:["All motorcycles with an engine capacity of 400cc or less","Only Learner Approved Motorcycle Scheme (LAMS) motorcycles","All motorcycles with an engine capacity of 660cc or less"],c:1,exp:"Learner and provisional riders must only ride LAMS-approved motorcycles, restricted by power-to-weight ratio."},
{id:"m6",q:"Motorcycle riders must ride \u2013",img:null,opts:["No more than 2 abreast in one traffic lane, unless overtaking","No more than 3 abreast in one traffic lane","In single file at all times"],c:0,exp:"Riders may ride two abreast within a lane but not more than two, unless one is overtaking."},
{id:"m7",q:"You are riding a motorcycle and standing stationary at a traffic-light controlled intersection on a single-lane road. Can you lane filter?",img:"m7",opts:["Yes, if the traffic light is green","Yes, if you lane filter at no more than 30 km/h","Yes, if you lane filter at the speed limit","No, lane filtering is illegal on a single-lane road"],c:3,exp:"Lane filtering requires two or more lanes in the same direction. On a single-lane road, it is not permitted."},
{id:"m8",q:"What is the legal maximum speed limit (unless signposted) for a first-year provisional motorcyclist (P1 licence) on the open road?",img:null,opts:["80 km/h","90 km/h","100 km/h"],c:0,exp:"P1 provisional motorcycle riders must not exceed 80 km/h, the same limit as learner motorcycle riders."},
{id:"m9",q:"As a learner motor cycle rider, you \u2013",img:null,opts:["Must only display L Plates when riding on highways","Must display one L Plate so that it can be clearly seen from the rear of the vehicle","Are not required to display L Plates"],c:1,exp:"Learner motorcycle riders must display one L plate clearly visible from the rear of the motorcycle."},
{id:"m10",q:"You are riding the motorcycle. Car A is too close to the centre line blocking the opportunity to lane filter. You should \u2013",img:"m10",opts:["Lane filter to the left, between Car A and the edge of the road","Cross the lanes of traffic, lane filtering between Car B and C","Stay behind Car A, as it is not safe to lane filter"],c:2,exp:"If there is not enough space to filter safely, stay behind. Never filter between a vehicle and the road edge."},
{id:"m11",q:"Before attempting to lane filter, you should \u2013",img:null,opts:["Sound your horn","Check there is enough space to safely lane filter between vehicles and merge back into traffic","Speed up and ride as fast as possible"],c:1,exp:"Always check there is sufficient space to filter safely and that you can merge back into traffic."},
{id:"m12",q:"Can a learner motorcycle rider carry a pillion passenger?",img:null,opts:["Yes","Only in daylight hours","Only if the pillion passenger has held a motorcycle licence for three years and is teaching the rider"],c:2,exp:"A learner rider may only carry a pillion who holds a full motorcycle licence of at least 3 years and is supervising."},
{id:"m13",q:"What is the minimum continuous period that a motorcycle learner licence must be held before progressing to a motorcycle provisional licence?",img:null,opts:["3 continuous months","6 continuous months","12 continuous months"],c:1,exp:"You must hold a motorcycle learner licence for a minimum of 6 continuous months before progressing."},
